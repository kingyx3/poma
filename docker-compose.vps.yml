services:
  poma-executor:
    build: .
    restart: unless-stopped
    env_file: .env
    command: ["rebalance", "--dry-run"]
    volumes:
      - ./reports:/app/reports
      - ./var:/app/var
    network_mode: host

# IB Gateway itself is intentionally not embedded here because production login,
# 2FA, auto-restart, and display handling differ by VPS/provider. Run IB Gateway
# as a separate supervised service, then point IBKR_HOST/IBKR_PORT at it.
