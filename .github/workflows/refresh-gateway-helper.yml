name: Refresh Gateway Helper

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: GitHub Environment to refresh.
        required: true
        type: choice
        options:
          - dev
          - stg
          - prd
        default: dev

permissions:
  contents: read
  id-token: write

jobs:
  refresh:
    name: Refresh helper (${{ inputs.deploy_environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_environment }}
    env:
      DEPLOY_ENVIRONMENT: ${{ inputs.deploy_environment }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve generated deployment config
        run: |
          set -euo pipefail
          config_path="ops/deploy/environments/${DEPLOY_ENVIRONMENT}.env"
          if [ ! -f "${config_path}" ]; then
            echo "::error::Missing generated deployment config: ${config_path}."
            exit 1
          fi
          set -a
          # shellcheck source=/dev/null
          . "${config_path}"
          set +a
          if [[ ! "${GCP_SERVICE_ACCOUNT_EMAIL}" =~ @([a-z0-9-]+)\.iam\.gserviceaccount\.com$ ]]; then
            echo "::error::GCP_SERVICE_ACCOUNT_EMAIL in ${config_path} must be a Google service account email"
            exit 1
          fi
          echo "GCP_WORKLOAD_IDENTITY_PROVIDER=${GCP_WORKLOAD_IDENTITY_PROVIDER}" >> "${GITHUB_ENV}"
          echo "GCP_SERVICE_ACCOUNT_EMAIL=${GCP_SERVICE_ACCOUNT_EMAIL}" >> "${GITHUB_ENV}"
          echo "GCP_PROJECT_ID=${BASH_REMATCH[1]}" >> "${GITHUB_ENV}"
          echo "GCP_ZONE=${GCP_ZONE:-us-west1-b}" >> "${GITHUB_ENV}"
          echo "GCP_VM_NAME=${GCP_VM_NAME:-poma-${DEPLOY_ENVIRONMENT}-free-tier}" >> "${GITHUB_ENV}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Refresh helper on VM
        run: bash ops/scripts/refresh_gateway_helper.sh
