name: Auto CI/CD

on:
  pull_request:
    types: [opened, reopened, synchronize]
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: poma-auto-cicd-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect deploy-relevant changes
    if: ${{ github.event_name != 'release' }}
    runs-on: ubuntu-latest
    outputs:
      deploy_required: ${{ steps.detect.outputs.deploy_required }}
      gateway_required: ${{ steps.detect.outputs.gateway_required }}
      reason: ${{ steps.detect.outputs.reason }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          deploy_required=false
          gateway_required=false
          reason="no deploy-relevant changes detected"
          unknown=false
          changed_files="$(mktemp)"

          is_all_zero_sha() {
            [ "${1:-}" = "0000000000000000000000000000000000000000" ]
          }

          is_shared_vm_gateway_path() {
            case "$1" in
              infra/gcp-free-tier/*|\
              ops/deploy/environments/*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          is_deploy_path() {
            case "$1" in
              .github/workflows/auto-cicd.yml|\
              .github/workflows/deploy-gcp-vm.yml|\
              Dockerfile|\
              docker-compose.yml|\
              .dockerignore|\
              pyproject.toml|\
              ops/scripts/deploy.sh|\
              ops/scripts/render_env.py|\
              ops/scripts/resolve_gcp_deploy_env.sh|\
              ops/scripts/validate_runtime_config.py|\
              ops/scripts/validate_data_provider.py)
                return 0
                ;;
              infra/gcp-free-tier/*|\
              ops/cron/*|\
              ops/deploy/environments/*|\
              src/*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          is_gateway_path() {
            case "$1" in
              .github/workflows/ib-gateway-ops.yml|\
              ops/scripts/repair_ib_gateway_runtime.py|\
              ops/scripts/install_ibc_config_helper.py|\
              ops/scripts/ensure_ibgateway_service.sh|\
              ops/scripts/diagnose_ib_gateway_runtime.py|\
              ops/scripts/wait_ib_gateway_2fa.py|\
              ops/scripts/run_gateway_ops_workflow.py)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          case "${EVENT_NAME}" in
            pull_request)
              base_sha="${PR_BASE_SHA}"
              head_sha="${PR_HEAD_SHA}"
              ;;
            *)
              base_sha=""
              head_sha=""
              unknown=true
              ;;
          esac

          if [ "${unknown}" = "false" ]; then
            if [ -z "${base_sha}" ] || [ -z "${head_sha}" ] || is_all_zero_sha "${base_sha}"; then
              unknown=true
            elif ! git diff --name-only "${base_sha}" "${head_sha}" > "${changed_files}"; then
              unknown=true
            fi
          fi

          if [ "${unknown}" = "true" ]; then
            deploy_required=true
            gateway_required=true
            reason="changed files unavailable; fail-open by running deploy and gateway configuration"
            : > "${changed_files}"
          else
            while IFS= read -r path; do
              [ -n "${path}" ] || continue
              if is_shared_vm_gateway_path "${path}"; then
                deploy_required=true
                gateway_required=true
              else
                if is_deploy_path "${path}"; then
                  deploy_required=true
                fi
                if is_gateway_path "${path}"; then
                  gateway_required=true
                fi
              fi
            done < "${changed_files}"

            # Deploy and Gateway Ops are coupled only for shared VM foundation paths
            # (Terraform VM foundation and generated deploy env files).
            # App/runtime code changes deploy the app only; Gateway-owned changes run Gateway Ops only.
            if [ "${deploy_required}" = "true" ] || [ "${gateway_required}" = "true" ]; then
              reason="deploy_required=${deploy_required}, gateway_required=${gateway_required} based on changed paths"
            fi
          fi

          {
            echo "deploy_required=${deploy_required}"
            echo "gateway_required=${gateway_required}"
            echo "reason=${reason}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "### Auto CI/CD change detection"
            echo
            echo "- event: ${EVENT_NAME}"
            echo "- deploy_required: ${deploy_required}"
            echo "- gateway_required: ${gateway_required}"
            echo "- reason: ${reason}"
            echo
            echo "Changed files:"
            if [ -s "${changed_files}" ]; then
              sed 's/^/- `/' "${changed_files}" | sed 's/$/`/'
            else
              echo "- none listed"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "${reason}"

  dev-deploy:
    needs: changes
    if: >-
      ${{ always() && github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          (needs.changes.result != 'success' || needs.changes.outputs.deploy_required == 'true') }}
    uses: ./.github/workflows/deploy-gcp-vm.yml
    with:
      deploy_environment: dev
      terraform_action: apply
      deploy_app: true
      trading_mode: paper
      data_provider: yahoo
      allow_live_trading: false
      deploy_smoke: true
    secrets: inherit

  dev-configure-gateway:
    needs: [changes, dev-deploy]
    if: >-
      ${{ always() && github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          (needs.dev-deploy.result == 'success' || needs.dev-deploy.result == 'skipped') &&
          (needs.changes.result != 'success' || needs.changes.outputs.gateway_required == 'true') }}
    uses: ./.github/workflows/ib-gateway-ops.yml
    with:
      deploy_environment: dev
      action: configure-paper
      log_lines: 200
    secrets: inherit

  # Publishing a non-prerelease GitHub release promotes to live/prd. prereleases are ignored so
  # they can be used for staging/testing without touching real money. prd GitHub Environment
  # protection rules (e.g. required reviewers) gate this deploy before it runs. Release deploys are
  # intentionally unconditional because publishing a release is an explicit production promotion.
  prd-deploy:
    if: ${{ github.event_name == 'release' && github.event.release.prerelease == false }}
    uses: ./.github/workflows/deploy-gcp-vm.yml
    with:
      deploy_environment: prd
      terraform_action: apply
      deploy_app: true
      trading_mode: live
      data_provider: yahoo
      allow_live_trading: true
      deploy_smoke: true
    secrets: inherit

  prd-configure-gateway:
    needs: prd-deploy
    uses: ./.github/workflows/ib-gateway-ops.yml
    with:
      deploy_environment: prd
      action: configure-live
      log_lines: 200
    secrets: inherit
