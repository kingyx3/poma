name: IB Gateway Ops

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: GitHub Environment to inspect.
        required: true
        type: choice
        options: [dev, stg, prd]
        default: dev
      action:
        description: Operation to run on the VM.
        required: true
        type: choice
        options: [status, restart, logs, app-logs, fix-app-docker-perms, verify-socket, verify-market-data, configure-paper, configure-live, clear-rebalance-state]
        default: status
      log_lines:
        description: Number of ibgateway journal / poma-cron.log lines for logs/app-logs/status output.
        required: true
        type: number
        default: 200
  workflow_call:
    inputs:
      deploy_environment:
        required: true
        type: string
      action:
        required: true
        type: string
      log_lines:
        required: false
        type: number
        default: 200

permissions:
  contents: read
  id-token: write

concurrency:
  group: poma-ib-gateway-ops-${{ inputs.deploy_environment }}
  cancel-in-progress: false

jobs:
  gateway-ops:
    name: IB Gateway ${{ inputs.action }} (${{ inputs.deploy_environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ${{ inputs.deploy_environment }}
    env:
      DEPLOY_ENVIRONMENT: ${{ inputs.deploy_environment }}
      INPUT_ACTION: ${{ inputs.action }}
      LOG_LINES: ${{ inputs.log_lines }}
      IB_GATEWAY_2FA_APPROVAL_TIMEOUT_SECONDS: 300
      IB_GATEWAY_SOCKET_POLL_SECONDS: 5
      IB_GATEWAY_LOGIN_PROGRESS_GRACE_SECONDS: 180
      IB_GATEWAY_MAX_TRADING_LOGIN_RESTARTS: 1
      IB_GATEWAY_IBKR_CHECK_TIMEOUT_SECONDS: 300
      IB_GATEWAY_RUNTIME_REPAIR_TIMEOUT_SECONDS: 780
      IBKR_LOGIN_ID: ${{ secrets.IBKR_LOGIN_ID }}
      IBKR_LOGIN_SECRET: ${{ secrets.IBKR_LOGIN_SECRET }}
      IBKR_LOGIN_ID_PAPER: ${{ secrets.IBKR_LOGIN_ID_PAPER }}
      IBKR_LOGIN_SECRET_PAPER: ${{ secrets.IBKR_LOGIN_SECRET_PAPER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve broker login secrets
        if: ${{ inputs.action == 'configure-paper' || inputs.action == 'configure-live' }}
        run: |
          set -euo pipefail
          case "${INPUT_ACTION}" in
            configure-paper)
              if [ -z "${IBKR_LOGIN_ID_PAPER:-}" ] || [ -z "${IBKR_LOGIN_SECRET_PAPER:-}" ]; then
                echo "::error::IBKR_LOGIN_ID_PAPER and IBKR_LOGIN_SECRET_PAPER GitHub Environment secrets are required for configure-paper"
                exit 1
              fi
              {
                echo "BROKER_LOGIN_ID=${IBKR_LOGIN_ID_PAPER}"
                echo "BROKER_LOGIN_VALUE=${IBKR_LOGIN_SECRET_PAPER}"
              } >> "${GITHUB_ENV}"
              ;;
            configure-live)
              if [ -z "${IBKR_LOGIN_ID:-}" ] || [ -z "${IBKR_LOGIN_SECRET:-}" ]; then
                echo "::error::IBKR_LOGIN_ID and IBKR_LOGIN_SECRET GitHub Environment secrets are required for configure-live"
                exit 1
              fi
              {
                echo "BROKER_LOGIN_ID=${IBKR_LOGIN_ID}"
                echo "BROKER_LOGIN_VALUE=${IBKR_LOGIN_SECRET}"
              } >> "${GITHUB_ENV}"
              ;;
          esac

      - name: Resolve generated deployment config
        run: |
          set -euo pipefail
          config_path="ops/deploy/environments/${DEPLOY_ENVIRONMENT}.env"
          if [ ! -f "${config_path}" ]; then
            echo "::error::Missing generated deployment config: ${config_path}. Run Bootstrap GCP Workload Identity Federation with terraform_action=apply first."
            exit 1
          fi
          set -a
          . "${config_path}"
          set +a
          require_non_empty() {
            local key="$1"
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required setting for ${DEPLOY_ENVIRONMENT}: ${key}"
              exit 1
            fi
          }
          require_non_empty GCP_WORKLOAD_IDENTITY_PROVIDER
          require_non_empty GCP_SERVICE_ACCOUNT_EMAIL
          if [[ ! "${GCP_SERVICE_ACCOUNT_EMAIL}" =~ @([a-z0-9-]+)\.iam\.gserviceaccount\.com$ ]]; then
            echo "::error::GCP_SERVICE_ACCOUNT_EMAIL in ${config_path} must be a Google service account email"
            exit 1
          fi
          echo "GCP_WORKLOAD_IDENTITY_PROVIDER=${GCP_WORKLOAD_IDENTITY_PROVIDER}" >> "${GITHUB_ENV}"
          echo "GCP_SERVICE_ACCOUNT_EMAIL=${GCP_SERVICE_ACCOUNT_EMAIL}" >> "${GITHUB_ENV}"
          echo "GCP_PROJECT_ID=${BASH_REMATCH[1]}" >> "${GITHUB_ENV}"
          echo "GCP_ZONE=${GCP_ZONE:-us-west1-b}" >> "${GITHUB_ENV}"
          echo "GCP_VM_NAME=${GCP_VM_NAME:-poma-${DEPLOY_ENVIRONMENT}-free-tier}" >> "${GITHUB_ENV}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Run Gateway logs over IAP SSH
        if: ${{ inputs.action == 'logs' }}
        run: |
          set -euo pipefail
          gcloud config set project "${GCP_PROJECT_ID}"
          echo "+ [ssh ${GCP_VM_NAME}] sudo journalctl -u ibgateway -n ${LOG_LINES} --reverse --no-pager"
          gcloud compute ssh "${GCP_VM_NAME}" \
            --zone "${GCP_ZONE}" \
            --tunnel-through-iap \
            --ssh-key-expire-after=15m \
            --quiet \
            --verbosity=error \
            --no-user-output-enabled \
            --command "sudo journalctl -u ibgateway -n ${LOG_LINES} --reverse --no-pager"

      - name: Run Gateway operation over IAP SSH
        if: ${{ inputs.action != 'logs' }}
        run: python3 ops/scripts/run_gateway_ops_workflow.py

      - name: Notify Telegram (gateway ops result)
        if: ${{ always() }}
        uses: ./.github/actions/telegram-notify
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: >-
            POMA[${{ inputs.deploy_environment }}] gateway ${{ inputs.action }}
            ${{ job.status }}. Configure actions require fresh IBKR 2FA evidence,
            API readiness, and poma ibkr-check before paper/live trading.
