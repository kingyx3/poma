name: Bootstrap GCP Workload Identity Federation

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: GitHub Environment to bootstrap.
        required: true
        type: choice
        options:
          - dev
          - stg
          - prd
        default: dev
      project_id:
        description: Optional override. Defaults to the project_id inside the bootstrap key.
        required: false
        type: string
      tf_state_bucket:
        description: Optional override. Defaults to poma-tf-state-<project-number>.
        required: false
        type: string
      state_bucket_location:
        description: GCS location for the generated Terraform state bucket.
        required: false
        type: string
        default: us-west1
      github_repository:
        description: GitHub repository allowed to deploy through WIF.
        required: true
        type: string
        default: kingyx3/poma
      terraform_action:
        description: Run Terraform plan only, or apply and commit generated deploy config.
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  contents: write

concurrency:
  group: poma-gcp-wif-bootstrap-${{ inputs.deploy_environment }}
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Bootstrap WIF (${{ inputs.deploy_environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_environment }}
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      DEPLOY_ENVIRONMENT: ${{ inputs.deploy_environment }}
      GITHUB_REPOSITORY_ALLOWED: ${{ inputs.github_repository }}
      STATE_BUCKET_LOCATION: ${{ inputs.state_bucket_location }}
      WIF_POOL_ID: poma-${{ inputs.deploy_environment }}-github
      WIF_PROVIDER_ID: github
      WIF_SERVICE_ACCOUNT_ID: poma-${{ inputs.deploy_environment }}-github-deployer

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Write validated bootstrap credentials
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_BOOTSTRAP_CREDENTIALS:-}" ]; then
            echo "::error::Missing GCP_BOOTSTRAP_SERVICE_ACCOUNT_KEY secret in GitHub Environment ${DEPLOY_ENVIRONMENT}"
            exit 1
          fi
          python3 <<'PY'
          import base64
          import json
          import os
          from pathlib import Path
          import sys

          raw = os.environ["GOOGLE_BOOTSTRAP_CREDENTIALS"].strip()

          def parse_service_account(value: str) -> dict:
              data = json.loads(value)
              if data.get("type") != "service_account":
                  raise ValueError("key type is not service_account")
              for key in ("project_id", "client_email"):
                  if not data.get(key):
                      raise ValueError(f"missing {key}")
              return data

          try:
              parsed = parse_service_account(raw)
          except Exception:
              try:
                  decoded = base64.b64decode(raw, validate=True).decode("utf-8")
                  parsed = parse_service_account(decoded)
              except Exception:
                  print(
                      "::error::GCP_BOOTSTRAP_SERVICE_ACCOUNT_KEY must be plain service-account JSON, "
                      "or base64-encoded service-account JSON. Do not upload a p12/binary key file.",
                      file=sys.stderr,
                  )
                  raise SystemExit(1)

          key_path = Path(os.environ["RUNNER_TEMP"]) / "gcp-bootstrap-key.json"
          key_path.write_text(json.dumps(parsed), encoding="utf-8")
          key_path.chmod(0o600)
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"GOOGLE_APPLICATION_CREDENTIALS={key_path}\n")
              env_file.write(f"CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE={key_path}\n")
              env_file.write(f"GCP_PROJECT_ID_FROM_KEY={parsed['project_id']}\n")
          PY
        env:
          GOOGLE_BOOTSTRAP_CREDENTIALS: ${{ secrets.GCP_BOOTSTRAP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Authenticate with temporary bootstrap key
        run: |
          set -euo pipefail
          gcloud auth activate-service-account --key-file="${GOOGLE_APPLICATION_CREDENTIALS}" --project="${GCP_PROJECT_ID_FROM_KEY}"
          gcloud config set project "${GCP_PROJECT_ID_FROM_KEY}"

      - name: Resolve bootstrap project id
        run: |
          set -euo pipefail
          project_id="${INPUT_PROJECT_ID:-${GCP_PROJECT_ID_FROM_KEY}}"
          if [ -z "${project_id}" ]; then
            echo "::error::Unable to resolve GCP project id"
            exit 1
          fi

          echo "GCP_PROJECT_ID=${project_id}" >> "${GITHUB_ENV}"
          echo "Resolved environment=${DEPLOY_ENVIRONMENT} project_id=${project_id}"
        env:
          INPUT_PROJECT_ID: ${{ inputs.project_id }}

      - name: Enable prerequisite APIs
        run: |
          set -euo pipefail
          gcloud services enable \
            serviceusage.googleapis.com \
            cloudresourcemanager.googleapis.com \
            compute.googleapis.com \
            iam.googleapis.com \
            iamcredentials.googleapis.com \
            iap.googleapis.com \
            storage.googleapis.com \
            sts.googleapis.com \
            --project="${GCP_PROJECT_ID}"

      - name: Resolve generated bootstrap values
        run: |
          set -euo pipefail
          project_number="$(gcloud projects describe "${GCP_PROJECT_ID}" --format='value(projectNumber)')"
          state_bucket="${INPUT_TF_STATE_BUCKET:-poma-tf-state-${project_number}}"

          echo "GCP_PROJECT_NUMBER=${project_number}" >> "${GITHUB_ENV}"
          echo "TF_STATE_BUCKET=${state_bucket}" >> "${GITHUB_ENV}"
          echo "Resolved environment=${DEPLOY_ENVIRONMENT} project_id=${GCP_PROJECT_ID} project_number=${project_number} tf_state_bucket=${state_bucket}"
        env:
          INPUT_TF_STATE_BUCKET: ${{ inputs.tf_state_bucket }}

      - name: Create Terraform state bucket
        run: |
          set -euo pipefail
          if gcloud storage buckets describe "gs://${TF_STATE_BUCKET}" --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            echo "Terraform state bucket already exists: gs://${TF_STATE_BUCKET}"
          else
            gcloud storage buckets create "gs://${TF_STATE_BUCKET}" \
              --project="${GCP_PROJECT_ID}" \
              --location="${STATE_BUCKET_LOCATION}" \
              --uniform-bucket-level-access
          fi
          gcloud storage buckets update "gs://${TF_STATE_BUCKET}" --versioning --project="${GCP_PROJECT_ID}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform -chdir=infra/gcp-wif-bootstrap init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=poma/${DEPLOY_ENVIRONMENT}/gcp-wif-bootstrap"

      - name: Terraform format check
        run: terraform fmt -check -recursive infra/gcp-wif-bootstrap

      - name: Terraform validate
        run: terraform -chdir=infra/gcp-wif-bootstrap validate

      - name: Import existing bootstrap resources into state
        run: |
          set -euo pipefail
          bash ops/scripts/import_gcp_wif_bootstrap_state.sh \
            --project-id "${GCP_PROJECT_ID}" \
            --pool-id "${WIF_POOL_ID}" \
            --provider-id "${WIF_PROVIDER_ID}" \
            --service-account-id "${WIF_SERVICE_ACCOUNT_ID}"

      - name: Terraform plan
        run: |
          terraform -chdir=infra/gcp-wif-bootstrap plan -out=tfplan \
            -var="project_id=${GCP_PROJECT_ID}" \
            -var="github_repository=${GITHUB_REPOSITORY_ALLOWED}" \
            -var="pool_id=${WIF_POOL_ID}" \
            -var="provider_id=${WIF_PROVIDER_ID}" \
            -var="service_account_id=${WIF_SERVICE_ACCOUNT_ID}"

      - name: Terraform apply
        if: ${{ inputs.terraform_action == 'apply' }}
        run: terraform -chdir=infra/gcp-wif-bootstrap apply -auto-approve tfplan

      - name: Commit generated deployment config
        if: ${{ inputs.terraform_action == 'apply' }}
        run: |
          set -euo pipefail
          provider="$(terraform -chdir=infra/gcp-wif-bootstrap output -raw workload_identity_provider)"
          service_account="$(terraform -chdir=infra/gcp-wif-bootstrap output -raw service_account_email)"
          config_dir="ops/deploy/environments"
          config_path="${config_dir}/${DEPLOY_ENVIRONMENT}.env"

          mkdir -p "${config_dir}"
          cat > "${config_path}" <<EOF
          # Generated by .github/workflows/bootstrap-gcp-wif.yml.
          # Safe to commit: contains non-secret deployment identifiers only.
          GCP_WORKLOAD_IDENTITY_PROVIDER=${provider}
          GCP_SERVICE_ACCOUNT_EMAIL=${service_account}
          TF_STATE_BUCKET=${TF_STATE_BUCKET}
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain -- "${config_path}")" ]; then
            git add "${config_path}"
            git commit -m "Update ${DEPLOY_ENVIRONMENT} generated deploy config [skip ci]"
            git push
          else
            echo "Generated deployment config unchanged: ${config_path}"
          fi

          cat <<EOF
          Generated deployment config is committed at ${config_path}.
          Deploy reads this file directly; bootstrap no longer writes GitHub Variables.
          EOF

      - name: Print cleanup reminder
        if: ${{ inputs.terraform_action == 'apply' }}
        run: |
          cat <<EOF
          WIF bootstrap completed for ${DEPLOY_ENVIRONMENT}.

          Cleanup now:
          1. Delete GCP_BOOTSTRAP_SERVICE_ACCOUNT_KEY from the ${DEPLOY_ENVIRONMENT} GitHub Environment.
          2. Delete or disable the temporary bootstrap service account key in GCP IAM.
          3. Normal deploys use ops/deploy/environments/${DEPLOY_ENVIRONMENT}.env plus GitHub Environment secrets.
          4. Keep runtime secrets in GitHub Environments: TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID.
          5. For paper deploys, set IBKR_ACCOUNT_PAPER. For live deploys, set IBKR_ACCOUNT and require allow_live_trading=true.
          6. Set IBKR_LOGIN_ID_PAPER and IBKR_LOGIN_SECRET_PAPER for paper Gateway configure actions.
          7. Set IBKR_LOGIN_ID and IBKR_LOGIN_SECRET only for live Gateway configure actions.
          8. Manually delete old GitHub Environment Variables from earlier bootstrap runs; current workflows do not read them.
          EOF
