name: Clear Rebalance Run State

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Dev/stg GitHub Environment whose VM rebalance run-state should be cleared.
        required: true
        type: choice
        options: [dev, stg]
        default: dev
      run_monitor_after_clear:
        description: Run poma monitor immediately after clearing state, using normal market-window guards.
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: poma-clear-rebalance-state-${{ inputs.deploy_environment }}
  cancel-in-progress: false

jobs:
  clear-state:
    name: Clear rebalance run state (${{ inputs.deploy_environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.deploy_environment }}
    env:
      DEPLOY_ENVIRONMENT: ${{ inputs.deploy_environment }}
      RUN_MONITOR_AFTER_CLEAR: ${{ inputs.run_monitor_after_clear }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve generated deployment config
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          source ops/scripts/resolve_gcp_deploy_env.sh

          echo "Resolved ${DEPLOY_ENVIRONMENT}: project=${GCP_PROJECT_ID}, zone=${GCP_ZONE}, vm=${GCP_VM_NAME}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Clear state and optionally run monitor
        run: |
          set -euo pipefail
          timeout --kill-after=30s 2m gcloud config set project "${GCP_PROJECT_ID}"
          ssh_common=(--zone "${GCP_ZONE}" --tunnel-through-iap --ssh-key-expire-after=15m --quiet)

          timeout --kill-after=30s 12m gcloud compute ssh "${GCP_VM_NAME}" "${ssh_common[@]}" --command "
            set -euo pipefail
            sudo install -d -o poma -g poma /opt/poma/state
            if [ -f /opt/poma/state/rebalance_state.json ]; then
              echo 'Clearing existing rebalance state file.'
            else
              echo 'No existing rebalance state file found.'
            fi
            sudo rm -f /opt/poma/state/rebalance_state.json
            sudo chown -R poma:poma /opt/poma/state
            echo 'Cleared /opt/poma/state/rebalance_state.json'

            if [ '${RUN_MONITOR_AFTER_CLEAR}' = 'true' ]; then
              if [ ! -f /opt/poma/docker-compose.vm.yml ]; then
                echo 'POMA app not deployed at /opt/poma (missing docker-compose.vm.yml)' >&2
                exit 1
              fi
              echo 'Running poma monitor after clearing state.'
              sudo -u poma bash -lc 'cd /opt/poma && docker compose --env-file .compose.env -f docker-compose.vm.yml run --rm poma monitor'
            else
              echo 'Skipping immediate monitor run; cron may run on the next eligible tick.'
            fi
          "

      - name: Notify Telegram (clear state result)
        if: ${{ always() }}
        uses: ./.github/actions/telegram-notify
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: >-
            POMA[${{ inputs.deploy_environment }}] clear-rebalance-state
            ${{ job.status }} — removed /opt/poma/state/rebalance_state.json and monitor-after-clear=${{ inputs.run_monitor_after_clear }}.
