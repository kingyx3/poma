name: Discover Telegram chat ID

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: GitHub Environment containing TELEGRAM_BOT_TOKEN.
        required: true
        type: choice
        options:
          - dev
          - stg
          - prd
        default: dev
      limit:
        description: Maximum Telegram updates to inspect per poll.
        required: true
        type: number
        default: 100
      timeout_seconds:
        description: Seconds to wait for a fresh bot/group/channel message after the run starts.
        required: true
        type: number
        default: 120
      delete_webhook:
        description: Temporarily delete an existing Telegram webhook before using getUpdates.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  discover:
    name: Discover chat ID (${{ inputs.deploy_environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_environment }}
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install helper dependency
        run: python -m pip install requests

      - name: Discover Telegram chat IDs
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then
            echo "::error::Missing TELEGRAM_BOT_TOKEN secret in GitHub Environment ${DEPLOY_ENVIRONMENT}"
            exit 1
          fi

          delete_webhook_flag=()
          if [ "${DELETE_WEBHOOK}" = "true" ]; then
            delete_webhook_flag+=(--delete-webhook)
          fi

          cat <<'EOF'
          Keep this workflow open, then send a fresh /start or any message to the bot.
          For a group/channel, add the bot there and send a fresh message in that group/channel.
          Existing messages sent before this run may already have been consumed by Telegram.
          Copy the matching chat ID from the first column below into TELEGRAM_CHAT_ID.
          EOF

          python ops/scripts/get_telegram_chat_id.py \
            --limit "${LIMIT}" \
            --timeout-seconds "${TIMEOUT_SECONDS}" \
            "${delete_webhook_flag[@]}"
        env:
          DEPLOY_ENVIRONMENT: ${{ inputs.deploy_environment }}
          LIMIT: ${{ inputs.limit }}
          TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
          DELETE_WEBHOOK: ${{ inputs.delete_webhook }}
