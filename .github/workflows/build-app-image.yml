name: Build app image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - run: |
          image_registry="ghcr.io"
          image_owner="kingyx3"
          image_name="poma"
          image="${image_registry}/${image_owner}/${image_name}"
          docker buildx build --push --tag "${image}:main" .
