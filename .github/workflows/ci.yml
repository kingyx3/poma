name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: pip install -e '.[dev]'
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest
      - name: Docker build smoke test
        run: docker build -t poma:${{ github.sha }} .

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
      - name: Terraform format check
        run: terraform -chdir=infra/gcp-free-tier fmt -check -recursive
      - name: Terraform init without backend
        run: terraform -chdir=infra/gcp-free-tier init -backend=false
      - name: Terraform validate
        run: terraform -chdir=infra/gcp-free-tier validate
