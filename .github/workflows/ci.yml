name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: pip install -e '.[dev]'
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: |
          set -o pipefail
          pytest 2>&1 | tee pytest.log
      - name: Upload pytest log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest.log
      - name: Docker build smoke test
        run: docker build -t poma:${{ github.sha }} .

  terraform:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - infra/gcp-free-tier
          - infra/gcp-wif-bootstrap
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
      - name: Terraform format check
        run: terraform fmt -check -recursive infra
      - name: Terraform init without backend
        run: terraform -chdir=${{ matrix.module }} init -backend=false
      - name: Terraform validate
        run: terraform -chdir=${{ matrix.module }} validate
