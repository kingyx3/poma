name: CI

# Runs on pull requests only. Pushes to main are handled by Auto CI/CD, which deploys; tests
# and lint gate the PR before it can merge.
on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        # Install against constraints.txt so tests exercise the exact runtime dependency
        # versions the deployed image ships (e.g. the pinned typer/click pair). Without this
        # CI silently resolves newer transitive deps and misses image-only breakages such as
        # the click >=8.2 / typer 0.12.3 command-build crash.
        run: pip install -e '.[dev]' -c constraints.txt
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: |
          set -o pipefail
          pytest 2>&1 | tee pytest.log
      - name: Upload pytest log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest.log
      # Cache image layers in the GitHub Actions cache (free, 10 GB) so the dependency layer
      # (pandas/numpy/ib_insync) is reused across PR runs instead of rebuilt every time.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker build smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: poma:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - infra/gcp-free-tier
          - infra/gcp-wif-bootstrap
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
      - name: Terraform format check
        run: terraform fmt -check -recursive infra
      - name: Terraform init without backend
        run: terraform -chdir=${{ matrix.module }} init -backend=false
      - name: Terraform validate
        run: terraform -chdir=${{ matrix.module }} validate
