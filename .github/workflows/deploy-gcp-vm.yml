name: Deploy GCP e2-micro VM

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: GitHub Environment to deploy.
        required: true
        type: choice
        options:
          - dev
          - stg
          - prd
        default: dev
      deployment_action:
        description: Deploy/update the VM, or undeploy and remove selected environment resources from Terraform state.
        required: true
        type: choice
        options:
          - deploy
          - undeploy
        default: deploy
      terraform_action:
        description: Run Terraform plan only, or apply the selected deployment action.
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan
      deploy_app:
        description: Upload code and rendered .env after Terraform apply.
        required: true
        type: boolean
        default: true
      trading_mode:
        description: Runtime mode for the rendered VM .env.
        required: true
        type: choice
        options:
          - dry_run
          - paper
          - live
        default: dry_run
      data_provider:
        description: Market-data provider for the rendered VM .env.
        required: true
        type: choice
        options:
          - fixture
          - yahoo
        default: yahoo
      allow_live_trading:
        description: Must be true when trading_mode=live.
        required: true
        type: boolean
        default: false
      deploy_smoke:
        description: Run the on-VM dry-run smoke test after pulling the image.
        required: false
        type: boolean
        default: true
      image:
        description: Full image ref to pull on the VM (blank = ghcr.io/kingyx3/poma:main).
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      deploy_environment:
        required: true
        type: string
      deployment_action:
        required: false
        type: string
        default: deploy
      terraform_action:
        required: false
        type: string
        default: apply
      deploy_app:
        required: false
        type: boolean
        default: true
      trading_mode:
        required: false
        type: string
        default: dry_run
      data_provider:
        required: false
        type: string
        default: yahoo
      allow_live_trading:
        required: false
        type: boolean
        default: false
      deploy_smoke:
        required: false
        type: boolean
        default: true
      image:
        required: false
        type: string
        default: ''

permissions:
  contents: read
  id-token: write

concurrency:
  group: poma-gcp-free-tier-deploy-${{ inputs.deploy_environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Terraform ${{ inputs.deployment_action }} (${{ inputs.deploy_environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: ${{ inputs.deploy_environment }}
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      DEPLOY_ENVIRONMENT: ${{ inputs.deploy_environment }}
      INPUT_DEPLOYMENT_ACTION: ${{ inputs.deployment_action }}
      INPUT_TERRAFORM_ACTION: ${{ inputs.terraform_action }}
      INPUT_TRADING_MODE: ${{ inputs.trading_mode }}
      INPUT_DATA_PROVIDER: ${{ inputs.data_provider }}
      INPUT_ALLOW_LIVE_TRADING: ${{ inputs.allow_live_trading }}
      INPUT_IMAGE: ${{ inputs.image }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve generated deployment config and selected action
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          source ops/scripts/resolve_gcp_deploy_env.sh

          case "${INPUT_DEPLOYMENT_ACTION}" in
            deploy|undeploy)
              ;;
            *)
              echo "::error::unsupported deployment_action=${INPUT_DEPLOYMENT_ACTION}; use deploy or undeploy"
              exit 1
              ;;
          esac
          case "${INPUT_TERRAFORM_ACTION}" in
            plan|apply)
              ;;
            *)
              echo "::error::unsupported terraform_action=${INPUT_TERRAFORM_ACTION}; use plan or apply"
              exit 1
              ;;
          esac

          echo "Resolved ${DEPLOY_ENVIRONMENT}: project=${GCP_PROJECT_ID}, region=${GCP_REGION}, zone=${GCP_ZONE}, state_bucket=${TF_STATE_BUCKET}, deployment_action=${INPUT_DEPLOYMENT_ACTION}, terraform_action=${INPUT_TERRAFORM_ACTION}"

      - name: Resolve CI runtime defaults
        if: ${{ inputs.deployment_action == 'deploy' }}
        env:
          IBKR_ACCOUNT: ${{ secrets.IBKR_ACCOUNT }}
          IBKR_ACCOUNT_PAPER: ${{ secrets.IBKR_ACCOUNT_PAPER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          source ops/scripts/resolve_gcp_deploy_env.sh

          set_env APP_ENV "${DEPLOY_ENVIRONMENT}"
          if [ "${APP_ENV}" != "${DEPLOY_ENVIRONMENT}" ]; then
            echo "::error::APP_ENV=${APP_ENV} must match deploy_environment=${DEPLOY_ENVIRONMENT}"
            exit 1
          fi
          set_env TRADING_MODE "${INPUT_TRADING_MODE}"
          set_env ALLOW_LIVE_TRADING "${INPUT_ALLOW_LIVE_TRADING}"
          set_default MARKET_CALENDAR "NASDAQ"
          set_default REBALANCE_AFTER_OPEN_MINUTES "10"
          case "${INPUT_DATA_PROVIDER}" in
            fixture|yahoo)
              set_env DATA_PROVIDER "${INPUT_DATA_PROVIDER}"
              ;;
            *)
              echo "::error::unsupported data_provider=${INPUT_DATA_PROVIDER}; use fixture or yahoo"
              exit 1
              ;;
          esac
          set_default UNIVERSE "us_top_market_cap"
          set_default RANK_LOOKBACK_DAYS "90"
          set_default MAX_HOLDINGS "50"
          set_default STRATEGY_ALLOCATIONS "rank_velocity_size_equal_weight=0.98,cash=0.02"
          set_default DRY_RUN_PORTFOLIO_VALUE_USD "10000"
          set_default MANAGED_CAP_MODE "broker_total"
          set_default MANAGED_CAP_USD "0"
          set_default MAX_POSITION_PCT "0.10"
          set_default MAX_TURNOVER_PCT "1.0"
          set_default MIN_TRADE_NOTIONAL_USD "25"
          set_default ESTIMATED_TRANSACTION_COST_BPS "0"
          set_default ESTIMATED_TRANSACTION_COST_FIXED_USD "0"
          set_default MIN_WEIGHT_DELTA_PCT "0.0025"
          set_default ORDER_TYPE "limit"
          set_default ALLOW_MARKET_ORDERS "false"
          set_default LIMIT_OFFSET_BPS "10"
          set_default MAX_ORDER_NOTIONAL_USD "2000"
          set_default MAX_DAILY_TRADES "100"
          # IBKR rejects fractional-sized API orders (error 10243); whole-share sizing is the
          # default everywhere.
          set_default FRACTIONAL_SHARES "false"
          set_default EXECUTION_PRICE_SOURCE "ibkr"
          set_default EXECUTION_PRICE_BASIS "side_of_market"
          set_default EXECUTION_QUOTE_MAX_AGE_SECONDS "60"
          set_default EXECUTION_MAX_SPREAD_BPS "50"
          # Paper/dry-run accounts commonly lack the separate IBKR "API market data" opt-in
          # even when delayed data is available, so default to using delayed quotes for
          # execution pricing there. Live keeps the conservative false default; deploy
          # validation separately hard-fails TRADING_MODE=live with this set to true regardless.
          if [ "${TRADING_MODE}" = "live" ]; then
            set_default ALLOW_DELAYED_EXECUTION_QUOTES "false"
          else
            set_default ALLOW_DELAYED_EXECUTION_QUOTES "true"
          fi
          set_default ALLOW_LAST_PRICE_FALLBACK "false"
          set_default ALLOW_UNSAFE_EXECUTION_PRICE_SOURCE "false"
          # Paper/dev requests direct-venue quotes first so IBKR's free non-consolidated US feed
          # can satisfy live checks when the API exposes it. Do not hard-require a live/frozen
          # tick by default: some paper Gateway sessions still classify that feed as delayed,
          # and ALLOW_DELAYED_EXECUTION_QUOTES=true is the explicit non-live fallback.
          # Set REQUIRE_LIVE_EXECUTION_QUOTES=true in the GitHub Environment for a proof-only run.
          # Live keeps false because a delayed-only probe already hard-fails there
          # (ALLOW_DELAYED_EXECUTION_QUOTES=false), keeping off-hours live configure unblocked.
          if [ "${TRADING_MODE}" = "live" ]; then
            set_default REQUIRE_LIVE_EXECUTION_QUOTES "false"
            set_default IBKR_MARKET_DATA_EXCHANGES "SMART"
          else
            set_default REQUIRE_LIVE_EXECUTION_QUOTES "false"
            set_default IBKR_MARKET_DATA_EXCHANGES "IEX,SMART"
          fi
          set_default MARKET_DATA_PROBE_WAIT_SECONDS "5"
          set_default ORDER_STATUS_TIMEOUT_SECONDS "60"
          set_default CANCEL_STALE_ORDERS "true"
          set_default ORDER_TIME_IN_FORCE "DAY"
          set_default REPLACE_AFTER_SECONDS "120"
          set_default CANCEL_AFTER_SECONDS "300"
          set_default REPLACE_PRICE_IMPROVEMENT_BPS "15"
          set_default STALE_ORDER_POLICY "block"
          set_default YAHOO_SCREENER_LIMIT "500"
          set_default YAHOO_SCREENER_PAGE_SIZE "250"
          set_default IBKR_HOST "127.0.0.1"
          set_default IBKR_PORT "7497"
          set_default IBKR_CLIENT_ID "101"
          set_default STATE_DIR "state"
          set_default DATA_DIR "data"
          set_default REPORT_DIR "reports"

          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID GitHub Environment secrets are required"
            exit 1
          fi
          set_env TELEGRAM_BOT_TOKEN "${TELEGRAM_BOT_TOKEN}"
          set_env TELEGRAM_CHAT_ID "${TELEGRAM_CHAT_ID}"
          case "${TRADING_MODE}" in
            paper)
              if [ -z "${IBKR_ACCOUNT_PAPER:-}" ]; then
                echo "::error::IBKR_ACCOUNT_PAPER GitHub Environment secret is required when TRADING_MODE=paper"
                exit 1
              fi
              set_env IBKR_ACCOUNT "${IBKR_ACCOUNT_PAPER}"
              ;;
            live)
              if [ -z "${IBKR_ACCOUNT:-}" ]; then
                echo "::error::IBKR_ACCOUNT GitHub Environment secret is required when TRADING_MODE=live"
                exit 1
              fi
              set_env IBKR_ACCOUNT "${IBKR_ACCOUNT}"
              ;;
            dry_run)
              if [ -n "${IBKR_ACCOUNT_PAPER:-}" ]; then
                set_env IBKR_ACCOUNT "${IBKR_ACCOUNT_PAPER}"
              elif [ -z "${IBKR_ACCOUNT:-}" ]; then
                echo "::error::IBKR_ACCOUNT_PAPER or IBKR_ACCOUNT GitHub Environment secret is required for deploy .env rendering"
                exit 1
              else
                set_env IBKR_ACCOUNT "${IBKR_ACCOUNT}"
              fi
              ;;
          esac
          if [ "${TRADING_MODE}" = "live" ] && [ "${ALLOW_LIVE_TRADING}" != "true" ]; then
            echo "::error::trading_mode=live requires allow_live_trading=true"
            exit 1
          fi

          echo "Resolved ${DEPLOY_ENVIRONMENT}: project=${GCP_PROJECT_ID}, region=${GCP_REGION}, zone=${GCP_ZONE}, state_bucket=${TF_STATE_BUCKET}, trading_mode=${TRADING_MODE}, data_provider=${DATA_PROVIDER}"

      - name: Render .env from CI defaults and GitHub secrets
        if: ${{ inputs.deployment_action == 'deploy' }}
        run: |
          timeout --kill-after=30s 2m python ops/scripts/render_env.py --strict-env --output .env.deploy || {
            echo "::error::render_env.py timed out or failed while rendering deployment .env"
            exit 1
          }

      - name: Validate rendered runtime config
        if: ${{ inputs.deployment_action == 'deploy' }}
        run: |
          set -euo pipefail
          timeout --kill-after=30s 2m pip install -e . || {
            echo "::error::Dependency install timed out while preparing runtime config validation"
            exit 1
          }
          timeout --kill-after=30s 2m python ops/scripts/validate_runtime_config.py --env-file .env.deploy || {
            echo "::error::Rendered runtime config failed validation"
            exit 1
          }

      - name: Validate market data provider output
        if: ${{ inputs.deployment_action == 'deploy' }}
        run: |
          set -euo pipefail
          if [ "${DATA_PROVIDER}" = "fixture" ]; then
            echo "Skipping external provider validation because DATA_PROVIDER=${DATA_PROVIDER}"
            exit 0
          fi
          timeout --kill-after=30s 5m python ops/scripts/validate_data_provider.py || {
            echo "::error::Market data provider validation timed out or failed"
            exit 1
          }

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure gcloud project
        run: |
          timeout --kill-after=30s 2m gcloud config set project "${GCP_PROJECT_ID}" || {
            echo "::error::gcloud project configuration timed out or failed"
            exit 1
          }

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: |
          set -euo pipefail
          timeout --kill-after=30s 5m terraform -chdir=infra/gcp-free-tier init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=poma/${DEPLOY_ENVIRONMENT}/gcp-free-tier" || {
              echo "::error::Terraform init timed out or failed"
              exit 1
            }

      # terraform fmt -check and validate run in ci.yml on every PR (covering both modules), so
      # they are not repeated here; `terraform plan` below still surfaces any config errors.
      - name: Terraform plan selected action
        run: |
          set -euo pipefail
          plan_args=(
            -var="project_id=${GCP_PROJECT_ID}"
            -var="region=${GCP_REGION}"
            -var="zone=${GCP_ZONE}"
            -var="instance_name=${GCP_VM_NAME}"
          )
          if [ "${INPUT_DEPLOYMENT_ACTION}" = "undeploy" ]; then
            plan_args=(-destroy "${plan_args[@]}")
          fi
          timeout --kill-after=30s 10m terraform -chdir=infra/gcp-free-tier plan -out=tfplan "${plan_args[@]}" || {
            echo "::error::Terraform ${INPUT_DEPLOYMENT_ACTION} plan timed out or failed"
            exit 1
          }

      - name: Terraform apply selected plan
        if: ${{ inputs.terraform_action == 'apply' }}
        run: |
          set -euo pipefail
          timeout --kill-after=30s 20m terraform -chdir=infra/gcp-free-tier apply -auto-approve tfplan || {
            echo "::error::Terraform ${INPUT_DEPLOYMENT_ACTION} apply timed out or failed"
            exit 1
          }

      - name: Export Terraform outputs
        if: ${{ inputs.deployment_action == 'deploy' && inputs.terraform_action == 'apply' && inputs.deploy_app }}
        run: |
          set -euo pipefail

          tf_output() {
            local name="$1" attempt=1 status output
            while true; do
              set +e
              output="$(timeout --kill-after=10s 45s terraform -chdir=infra/gcp-free-tier output -raw "${name}" 2>&1)"
              status="$?"
              set -e
              if [ "${status}" -eq 0 ]; then
                printf '%s' "${output}"
                return 0
              fi
              if [ "${attempt}" -ge 3 ]; then
                echo "::error::Unable to read Terraform output ${name} after ${attempt} attempt(s)" >&2
                printf '%s\n' "${output}" >&2
                return "${status}"
              fi
              attempt=$((attempt + 1))
              echo "Terraform output ${name} failed; retrying attempt ${attempt}/3 in 10s..." >&2
              sleep 10
            done
          }

          instance_name="$(tf_output instance_name)"
          zone="$(tf_output zone)"
          startup_revision="$(tf_output startup_revision)"
          {
            echo "TF_INSTANCE_NAME=${instance_name}"
            echo "TF_ZONE=${zone}"
            echo "TF_STARTUP_REVISION=${startup_revision}"
          } >> "${GITHUB_ENV}"
          echo "Terraform outputs exported: instance_name=${instance_name}, zone=${zone}, startup_revision=${startup_revision}"

      - name: Verify Terraform state is clean after undeploy
        if: ${{ inputs.deployment_action == 'undeploy' && inputs.terraform_action == 'apply' }}
        run: |
          set -euo pipefail
          state_output="$(terraform -chdir=infra/gcp-free-tier state list 2>&1)" || {
            if printf '%s\n' "${state_output}" | grep -q "No state file was found"; then
              echo "No Terraform state file remains for ${DEPLOY_ENVIRONMENT}; undeploy is clean."
              exit 0
            fi
            echo "::error::Unable to inspect Terraform state after undeploy"
            printf '%s\n' "${state_output}"
            exit 1
          }
          if [ -n "${state_output}" ]; then
            echo "::error::Terraform state still contains managed resources after undeploy"
            printf '%s\n' "${state_output}"
            exit 1
          fi
          echo "Terraform state is empty for ${DEPLOY_ENVIRONMENT}; undeploy is clean."

      - name: Package application
        if: ${{ inputs.deployment_action == 'deploy' && inputs.terraform_action == 'apply' && inputs.deploy_app }}
        run: |
          set -euo pipefail
          chmod 600 .env.deploy
          # Ship only the runtime files required on the VM, plus the already-rendered
          # environment file. A single IAP upload avoids a second SSH/SCP round trip while
          # keeping CI/test/docs/git history off the e2-micro.
          timeout --kill-after=30s 2m tar \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            -czf /tmp/poma.tar.gz \
            .env.deploy \
            .dockerignore \
            Dockerfile \
            README.md \
            docker-compose.vm.yml \
            docker-compose.yml \
            pyproject.toml \
            src \
            ops/cron \
            ops/scripts/deploy.sh || {
              echo "::error::Runtime package creation timed out or failed"
              exit 1
            }
          echo "Packaged runtime archive: $(du -h /tmp/poma.tar.gz | awk '{print $1}')"

      - name: Upload and install on VM
        if: ${{ inputs.deployment_action == 'deploy' && inputs.terraform_action == 'apply' && inputs.deploy_app }}
        timeout-minutes: 40
        run: |
          set -euo pipefail

          instance_name="${TF_INSTANCE_NAME:?missing Terraform output TF_INSTANCE_NAME}"
          zone="${TF_ZONE:?missing Terraform output TF_ZONE}"
          startup_revision="${TF_STARTUP_REVISION:?missing Terraform output TF_STARTUP_REVISION}"
          ssh_common=(--zone "${zone}" --tunnel-through-iap --ssh-key-expire-after=15m --quiet --verbosity=error --no-user-output-enabled)
          step_start="${SECONDS}"

          # Validate the requested image ref before it is interpolated into the remote shell
          # command. An empty value is allowed and makes the VM fall back to deploy.sh's
          # default (ghcr.io/kingyx3/poma:main); a non-empty value must be a plain registry
          # reference so it cannot smuggle shell metacharacters onto the VM.
          if [ -n "${INPUT_IMAGE}" ] && ! printf '%s' "${INPUT_IMAGE}" | grep -Eq '^[A-Za-z0-9._/-]+:[A-Za-z0-9._-]+$'; then
            echo "::error::Refusing to deploy malformed image ref: ${INPUT_IMAGE}"
            exit 1
          fi
          echo "Deploying image: ${INPUT_IMAGE:-ghcr.io/kingyx3/poma:main (default)}"

          timed() {
            local label="$1" start status
            shift
            start="${SECONDS}"
            echo "::group::${label}"
            set +e
            "$@"
            status="$?"
            set -e
            echo "::endgroup::"
            echo "TIMING ${label}: $((SECONDS - start))s (status=${status})"
            if [ "${status}" -eq 124 ]; then
              echo "::error::${label} timed out; check VM readiness, IAP/SSH connectivity, Docker image pull, or deploy-script health."
            fi
            return "${status}"
          }

          run_with_timeout() {
            local seconds="$1"
            shift
            timeout --kill-after=30s "${seconds}" "$@"
          }

          print_vm_bootstrap_status() {
            run_with_timeout 30s gcloud compute ssh "${instance_name}" "${ssh_common[@]}" --command '
              set +e
              echo "===== POMA VM bootstrap status ====="
              echo "sentinel=$(cat /var/lib/poma/vm-ready 2>/dev/null || true)"
              echo "startup_failed=$(cat /var/lib/poma/vm-startup-failed 2>/dev/null || true)"
              echo "boot_id=$(cat /proc/sys/kernel/random/boot_id 2>/dev/null || true)"
              id poma || true
              systemctl is-active docker cron || true
              systemctl --no-pager --full status google-startup-scripts.service google-guest-agent.service docker cron || true
              journalctl --no-pager -n 100 -u google-startup-scripts.service -u google-guest-agent.service -u docker -u cron || true
            ' || true
          }

          # Poll the VM over IAP until the POMA startup readiness sentinel matches this
          # deploy's startup revision and the app user plus Docker/cron services exist. Each
          # probe is a short, independently timed SSH, so a cold boot or a transient
          # IAP/SSH-key-propagation hang is retried with a fresh connection. Do not accept
          # cloud-init's boot-finished marker by itself: the Google metadata startup script can
          # still be running, and deploy needs the concrete POMA host contract.
          wait_for_vm_ready() {
            local wait_seconds="$1" wait_label="$2"
            local deadline=$((SECONDS + wait_seconds)) attempt=0 status=1 saw_remote=0
            while true; do
              set +e
              run_with_timeout 45s gcloud compute ssh "${instance_name}" "${ssh_common[@]}" \
                --command "startup_failed=\"\$(cat /var/lib/poma/vm-startup-failed 2>/dev/null || true)\"; if [ -n \"\${startup_failed}\" ]; then echo \"startup_failed=\${startup_failed}\" >&2; exit 42; fi; sentinel=\"\$(cat /var/lib/poma/vm-ready 2>/dev/null || true)\"; boot_id=\"\$(cat /proc/sys/kernel/random/boot_id)\"; if test \"\${sentinel}\" = \"${startup_revision} \${boot_id}\" && id poma >/dev/null 2>&1 && systemctl is-active --quiet docker && systemctl is-active --quiet cron; then exit 0; fi; if systemctl is-active --quiet google-startup-scripts.service; then echo \"startup_status=running\" >&2; exit 43; fi; echo \"startup_status=not-ready\" >&2; exit 44"
              status="$?"
              set -e
              if [ "${status}" -eq 0 ]; then
                return 0
              fi
              if [ "${status}" -eq 42 ]; then
                echo "::error::VM startup script failed before writing the readiness sentinel."
                print_vm_bootstrap_status
                return 42
              fi
              if [ "${status}" -eq 43 ] || [ "${status}" -eq 44 ]; then
                saw_remote=1
              fi
              if [ "${SECONDS}" -ge "${deadline}" ]; then
                echo "VM ${instance_name} not reachable or startup revision ${startup_revision} not ready within ${wait_label}." >&2
                print_vm_bootstrap_status
                if [ "${saw_remote}" -eq 1 ]; then
                  return 2
                fi
                return 1
              fi
              attempt=$((attempt + 1))
              echo "VM not ready yet (attempt ${attempt}); retrying in 10s..."
              sleep 10
            done
          }

          # Self-heal a wedged VM: if it never becomes reachable (e.g. a prior boot exhausted the
          # 1 GB e2-micro and left SSH dead), reset it once. A reboot reruns the minimal startup
          # script from metadata and clears the hung/OOM state. terraform_data.startup_revision
          # separately recreates the VM whenever startup.sh changes, so this only covers transient
          # or wedged states, not config drift.
          ensure_vm_ready() {
            local status
            set +e
            wait_for_vm_ready 720 "12m"
            status="$?"
            set -e
            if [ "${status}" -eq 0 ]; then
              return 0
            fi
            if [ "${status}" -eq 2 ] || [ "${status}" -eq 42 ]; then
              echo "::error::VM is reachable but did not finish startup readiness; not resetting a still-bootstrapping host." >&2
              return 1
            fi
            echo "Resetting ${instance_name} once and waiting for it to come back."
            run_with_timeout 3m gcloud compute instances reset "${instance_name}" --zone "${zone}" --quiet || true
            wait_for_vm_ready 720 "12m"
          }

          retry_with_backoff() {
            local timeout_duration="$1" label="$2" max_attempts="$3"
            shift 3

            local attempt=1
            until run_with_timeout "${timeout_duration}" "$@"; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "${label} failed after ${attempt} attempt(s)." >&2
                return 1
              fi
              attempt=$((attempt + 1))
              echo "${label} failed; retrying attempt ${attempt}/${max_attempts} in 15s..."
              sleep 15
            done
          }

          timed "VM readiness" ensure_vm_ready

          timed "Pause app cron before deploy" run_with_timeout 45s \
            gcloud compute ssh "${instance_name}" "${ssh_common[@]}" --command '
              set +e
              sudo crontab -r -u poma 2>/dev/null || true
              sudo systemctl stop cron || true
              if [ -f /opt/poma/docker-compose.vm.yml ] && [ -f /opt/poma/.compose.env ]; then
                cd /opt/poma && sudo -u poma docker compose --env-file .compose.env -f docker-compose.vm.yml down --remove-orphans || true
              fi
            '

          timed "Deployment bundle upload" retry_with_backoff 4m "Deployment bundle upload" 2 \
            gcloud compute scp /tmp/poma.tar.gz "${instance_name}:/tmp/poma.tar.gz" "${ssh_common[@]}"

          timed "Remote install, Docker pull, optional smoke, cron" run_with_timeout 15m \
            gcloud compute ssh "${instance_name}" "${ssh_common[@]}" --command '
            set -euo pipefail

            remote_started="$(date +%s)"
            remote_failure_diagnostics() {
              local status="$?"
              if [ "${status}" -eq 0 ]; then
                return 0
              fi
              echo "REMOTE FAILURE status=${status}; collecting deploy diagnostics" >&2
              pwd >&2 || true
              id poma >&2 || true
              sudo -u poma id >&2 || true
              ls -la /opt/poma >&2 || true
              find /opt/poma -maxdepth 2 -mindepth 1 -printf "%M %u:%g %p\n" 2>/dev/null | sort >&2 || true
              docker --version >&2 || true
              docker compose version >&2 || true
              systemctl is-active docker cron >&2 || true
              df -h / /opt/poma >&2 || true
              timeout --kill-after=10s 10s docker system df >&2 || true
              if [ -f /opt/poma/.compose.env ]; then
                sed "s/^POMA_IMAGE=.*/POMA_IMAGE=<redacted>/" /opt/poma/.compose.env >&2 || true
              fi
              exit "${status}"
            }
            trap remote_failure_diagnostics EXIT

            remote_timed() {
              local label="$1" status start
              shift
              start="$(date +%s)"
              echo "REMOTE TIMING BEGIN ${label}"
              set +e
              "$@"
              status="$?"
              set -e
              echo "REMOTE TIMING END ${label}: $(( $(date +%s) - start ))s (status=${status})"
              return "${status}"
            }

            remote_timed "Prepare app directory" sudo mkdir -p /opt/poma
            remote_timed "Fix app directory ownership" sudo chown poma:poma /opt/poma
            # Remove files owned by the deploy package before extracting the trimmed runtime set.
            # Preserve .env plus runtime data/report/state/log directories across deploys.
            remote_timed "Remove old deployed package files" sudo rm -rf \
              /opt/poma/.dockerignore \
              /opt/poma/.git \
              /opt/poma/.github \
              /opt/poma/Dockerfile \
              /opt/poma/README.md \
              /opt/poma/docker-compose.vm.yml \
              /opt/poma/docker-compose.yml \
              /opt/poma/docs \
              /opt/poma/infra \
              /opt/poma/ops \
              /opt/poma/pyproject.toml \
              /opt/poma/src \
              /opt/poma/tests
            remote_timed "Make deployment bundle readable" sudo chmod 644 /tmp/poma.tar.gz
            remote_timed "Extract deployment bundle as app user" sudo -u poma tar -xzf /tmp/poma.tar.gz -C /opt/poma
            test -f /opt/poma/.env.deploy || { echo "Rendered environment missing from deployment bundle" >&2; exit 1; }
            remote_timed "Install rendered environment" sudo -u poma mv /opt/poma/.env.deploy /opt/poma/.env
            remote_timed "Secure rendered environment" sudo -u poma chmod 600 /opt/poma/.env
            remote_timed "Remove uploaded deployment bundle" sudo rm -f /tmp/poma.tar.gz
            remote_timed "Ensure runtime state directories" sudo install -d -o poma -g poma \
              /opt/poma/data \
              /opt/poma/logs \
              /opt/poma/reports \
              /opt/poma/state
            cd /opt/poma
            # IB Gateway runtime (binaries, GUI packages, helpers, systemd service) is owned by
            # the IB Gateway Ops workflow, which Auto CI/CD runs right after this deploy. Keeping
            # it out of the deploy keeps this step to app concerns only (image pull + optional smoke + cron).
            remote_timed "Docker pull and optional smoke" sudo -u poma env RUN_DEPLOY_SMOKE=${{ inputs.deploy_smoke }} RUN_DOCKER_PULL_DIAGNOSTICS=${{ inputs.deploy_smoke }} RUN_DOCKER_PRUNE=${{ inputs.deploy_smoke }} POMA_IMAGE=${{ inputs.image }} bash ops/scripts/deploy.sh
            remote_timed "Install cron schedule" sudo -u poma crontab ops/cron/poma.cron
            remote_timed "Restart cron scheduler" sudo systemctl restart cron
            echo "REMOTE TIMING total: $(( $(date +%s) - remote_started ))s"
          '

          echo "TIMING Upload and install on VM total: $((SECONDS - step_start))s"

      - name: Notify Telegram (deployment result)
        if: ${{ always() }}
        uses: ./.github/actions/telegram-notify
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: >-
            POMA[${{ inputs.deploy_environment }}] ${{ inputs.deployment_action }} ${{ job.status }} —
            terraform=${{ inputs.terraform_action }}, app=${{ inputs.deploy_app }},
            mode=${{ inputs.trading_mode }}, provider=${{ inputs.data_provider }}
            (${{ github.sha }})
