name: Deploy GCP e2-micro VM

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: GitHub Environment to deploy.
        required: true
        type: choice
        options:
          - dev
          - stg
          - prd
        default: dev
      terraform_action:
        description: Run Terraform plan only, or apply and deploy.
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan
      deploy_app:
        description: Upload code and rendered .env after Terraform apply.
        required: true
        type: boolean
        default: true
      trading_mode:
        description: Runtime mode for the rendered VM .env.
        required: true
        type: choice
        options:
          - dry_run
          - paper
          - live
        default: dry_run
      data_provider:
        description: Market-data provider for the rendered VM .env.
        required: true
        type: choice
        options:
          - fixture
          - yahoo
        default: yahoo
      allow_live_trading:
        description: Must be true when trading_mode=live.
        required: true
        type: boolean
        default: false
      deploy_smoke:
        description: Run the on-VM dry-run smoke test after building the image.
        required: false
        type: boolean
        default: true
  workflow_call:
    inputs:
      deploy_environment:
        required: true
        type: string
      terraform_action:
        required: false
        type: string
        default: apply
      deploy_app:
        required: false
        type: boolean
        default: true
      trading_mode:
        required: false
        type: string
        default: dry_run
      data_provider:
        required: false
        type: string
        default: yahoo
      allow_live_trading:
        required: false
        type: boolean
        default: false
      deploy_smoke:
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: poma-gcp-free-tier-deploy-${{ inputs.deploy_environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Terraform and deploy (${{ inputs.deploy_environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ inputs.deploy_environment }}
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      DEPLOY_ENVIRONMENT: ${{ inputs.deploy_environment }}
      INPUT_TERRAFORM_ACTION: ${{ inputs.terraform_action }}
      INPUT_TRADING_MODE: ${{ inputs.trading_mode }}
      INPUT_DATA_PROVIDER: ${{ inputs.data_provider }}
      INPUT_ALLOW_LIVE_TRADING: ${{ inputs.allow_live_trading }}

      # Minimal runtime secrets. Telegram is mandatory; IBKR is required by selected modes.
      IBKR_ACCOUNT: ${{ secrets.IBKR_ACCOUNT }}
      IBKR_ACCOUNT_PAPER: ${{ secrets.IBKR_ACCOUNT_PAPER }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve generated deployment config and CI defaults
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          source ops/scripts/resolve_gcp_deploy_env.sh

          set_env APP_ENV "${DEPLOY_ENVIRONMENT}"
          if [ "${APP_ENV}" != "${DEPLOY_ENVIRONMENT}" ]; then
            echo "::error::APP_ENV=${APP_ENV} must match deploy_environment=${DEPLOY_ENVIRONMENT}"
            exit 1
          fi
          set_env TRADING_MODE "${INPUT_TRADING_MODE}"
          set_env ALLOW_LIVE_TRADING "${INPUT_ALLOW_LIVE_TRADING}"
          set_default MARKET_CALENDAR "NASDAQ"
          set_default REBALANCE_AFTER_OPEN_MINUTES "10"
          case "${INPUT_DATA_PROVIDER}" in
            fixture|yahoo)
              set_env DATA_PROVIDER "${INPUT_DATA_PROVIDER}"
              ;;
            *)
              echo "::error::unsupported data_provider=${INPUT_DATA_PROVIDER}; use fixture or yahoo"
              exit 1
              ;;
          esac
          set_default UNIVERSE "us_top_market_cap"
          set_default RANK_LOOKBACK_DAYS "90"
          set_default MAX_HOLDINGS "100"
          set_default PORTFOLIO_VALUE_USD "10000"
          set_default CASH_BUFFER_PCT "0.02"
          set_default MAX_POSITION_PCT "0.10"
          set_default MAX_TURNOVER_PCT "0.35"
          set_default MIN_TRADE_NOTIONAL_USD "25"
          set_default MIN_WEIGHT_DELTA_PCT "0.0025"
          set_default ORDER_TYPE "limit"
          set_default ALLOW_MARKET_ORDERS "false"
          set_default LIMIT_OFFSET_BPS "10"
          set_default MAX_ORDER_NOTIONAL_USD "2000"
          set_default MAX_DAILY_TRADES "100"
          set_default ORDER_STATUS_TIMEOUT_SECONDS "60"
          set_default CANCEL_STALE_ORDERS "true"
          set_default YAHOO_SCREENER_LIMIT "500"
          set_default YAHOO_SCREENER_PAGE_SIZE "250"
          set_default IBKR_HOST "127.0.0.1"
          set_default IBKR_PORT "7497"
          set_default IBKR_CLIENT_ID "101"
          set_default STATE_DIR "state"
          set_default DATA_DIR "data"
          set_default REPORT_DIR "reports"

          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID GitHub Environment secrets are required"
            exit 1
          fi
          case "${TRADING_MODE}" in
            paper)
              if [ -z "${IBKR_ACCOUNT_PAPER:-}" ]; then
                echo "::error::IBKR_ACCOUNT_PAPER GitHub Environment secret is required when TRADING_MODE=paper"
                exit 1
              fi
              set_env IBKR_ACCOUNT "${IBKR_ACCOUNT_PAPER}"
              ;;
            live)
              if [ -z "${IBKR_ACCOUNT:-}" ]; then
                echo "::error::IBKR_ACCOUNT GitHub Environment secret is required when TRADING_MODE=live"
                exit 1
              fi
              ;;
            dry_run)
              if [ -n "${IBKR_ACCOUNT_PAPER:-}" ]; then
                set_env IBKR_ACCOUNT "${IBKR_ACCOUNT_PAPER}"
              elif [ -z "${IBKR_ACCOUNT:-}" ]; then
                echo "::error::IBKR_ACCOUNT_PAPER or IBKR_ACCOUNT GitHub Environment secret is required for deploy .env rendering"
                exit 1
              fi
              ;;
          esac
          if [ "${TRADING_MODE}" = "live" ] && [ "${ALLOW_LIVE_TRADING}" != "true" ]; then
            echo "::error::trading_mode=live requires allow_live_trading=true"
            exit 1
          fi

          echo "Resolved ${DEPLOY_ENVIRONMENT}: project=${GCP_PROJECT_ID}, region=${GCP_REGION}, zone=${GCP_ZONE}, state_bucket=${TF_STATE_BUCKET}, trading_mode=${TRADING_MODE}, data_provider=${DATA_PROVIDER}"

      - name: Render .env from CI defaults and GitHub secrets
        run: python ops/scripts/render_env.py --strict-env --output .env.deploy

      - name: Validate market data provider output
        run: |
          set -euo pipefail
          if [ "${DATA_PROVIDER}" = "fixture" ]; then
            echo "Skipping external provider validation because DATA_PROVIDER=${DATA_PROVIDER}"
            exit 0
          fi
          pip install -e .
          python ops/scripts/validate_data_provider.py

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure gcloud project
        run: gcloud config set project "${GCP_PROJECT_ID}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform -chdir=infra/gcp-free-tier init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=poma/${DEPLOY_ENVIRONMENT}/gcp-free-tier"

      # terraform fmt -check and validate run in ci.yml on every PR (covering both modules), so
      # they are not repeated here; `terraform plan` below still surfaces any config errors.
      - name: Terraform plan
        run: |
          terraform -chdir=infra/gcp-free-tier plan -out=tfplan \
            -var="project_id=${GCP_PROJECT_ID}" \
            -var="region=${GCP_REGION}" \
            -var="zone=${GCP_ZONE}" \
            -var="instance_name=${GCP_VM_NAME}"

      - name: Terraform apply
        if: ${{ inputs.terraform_action == 'apply' }}
        run: terraform -chdir=infra/gcp-free-tier apply -auto-approve tfplan

      - name: Package application
        if: ${{ inputs.terraform_action == 'apply' && inputs.deploy_app }}
        run: |
          set -euo pipefail
          # Ship only the runtime files required on the VM. Avoid uploading CI/test/docs/git
          # history so IAP transfer and on-VM Docker build contexts stay small.
          tar \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            -czf /tmp/poma.tar.gz \
            .dockerignore \
            Dockerfile \
            README.md \
            docker-compose.yml \
            pyproject.toml \
            src \
            ops/cron \
            ops/scripts/deploy.sh

      - name: Upload and install on VM
        if: ${{ inputs.terraform_action == 'apply' && inputs.deploy_app }}
        timeout-minutes: 55
        run: |
          set -euo pipefail

          instance_name="$(terraform -chdir=infra/gcp-free-tier output -raw instance_name)"
          zone="$(terraform -chdir=infra/gcp-free-tier output -raw zone)"
          startup_revision="$(terraform -chdir=infra/gcp-free-tier output -raw startup_revision)"
          ssh_common=(--zone "${zone}" --tunnel-through-iap --ssh-key-expire-after=15m --quiet)

          run_with_timeout() {
            local seconds="$1"
            shift
            timeout --kill-after=30s "${seconds}" "$@"
          }

          # Poll the VM over IAP until the POMA startup readiness sentinel matches this
          # deploy's startup revision. Each probe is a
          # short, independently-timed SSH, so a cold boot (the minimal startup installs Docker +
          # cron and writes /var/lib/poma/vm-ready with the current boot id) or a transient
          # IAP/SSH-key-propagation hang is
          # retried with a fresh connection
          # instead of blocking the whole step on one long-lived SSH. Returns within seconds on an
          # already-warm VM.
          wait_for_vm_ready() {
            local deadline=$((SECONDS + 420)) attempt=0
            until run_with_timeout 75s gcloud compute ssh "${instance_name}" "${ssh_common[@]}" \
                --command "test \"\$(cat /var/lib/poma/vm-ready 2>/dev/null)\" = \"${startup_revision} \$(cat /proc/sys/kernel/random/boot_id)\""; do
              if [ "${SECONDS}" -ge "${deadline}" ]; then
                echo "VM ${instance_name} not reachable / startup revision ${startup_revision} not ready within 7m." >&2
                return 1
              fi
              attempt=$((attempt + 1))
              echo "VM not ready yet (attempt ${attempt}); retrying in 15s..."
              sleep 15
            done
          }

          # Self-heal a wedged VM: if it never becomes reachable (e.g. a prior boot exhausted the
          # 1 GB e2-micro and left SSH dead), reset it once. A reboot reruns the minimal startup
          # script from metadata and clears the hung/OOM state. terraform_data.startup_revision
          # separately recreates the VM whenever startup.sh changes, so this only covers transient
          # or wedged states, not config drift.
          ensure_vm_ready() {
            if wait_for_vm_ready; then
              return 0
            fi
            echo "Resetting ${instance_name} once and waiting for it to come back."
            run_with_timeout 3m gcloud compute instances reset "${instance_name}" --zone "${zone}" --quiet || true
            wait_for_vm_ready
          }

          retry_with_backoff() {
            local timeout_duration="$1" label="$2" max_attempts="$3"
            shift 3

            local attempt=1
            until run_with_timeout "${timeout_duration}" "$@"; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "${label} failed after ${attempt} attempt(s)." >&2
                return 1
              fi
              attempt=$((attempt + 1))
              echo "${label} failed; retrying attempt ${attempt}/${max_attempts} in 15s..."
              sleep 15
            done
          }

          ensure_vm_ready

          retry_with_backoff 3m "App package upload" 3 \
            gcloud compute scp /tmp/poma.tar.gz "${instance_name}:/tmp/poma.tar.gz" "${ssh_common[@]}"
          retry_with_backoff 2m "Environment upload" 3 \
            gcloud compute scp .env.deploy "${instance_name}:/tmp/poma.env" "${ssh_common[@]}"

          run_with_timeout 25m gcloud compute ssh "${instance_name}" "${ssh_common[@]}" --command '
            set -euo pipefail
            sudo mkdir -p /opt/poma
            # Remove files owned by the deploy package before extracting the trimmed runtime set.
            # Preserve .env plus runtime data/report/state/log directories across deploys.
            sudo rm -rf \
              /opt/poma/.dockerignore \
              /opt/poma/.git \
              /opt/poma/.github \
              /opt/poma/Dockerfile \
              /opt/poma/README.md \
              /opt/poma/docker-compose.yml \
              /opt/poma/docs \
              /opt/poma/infra \
              /opt/poma/ops \
              /opt/poma/pyproject.toml \
              /opt/poma/src \
              /opt/poma/tests
            sudo tar -xzf /tmp/poma.tar.gz -C /opt/poma
            sudo mv /tmp/poma.env /opt/poma/.env
            sudo chmod 600 /opt/poma/.env
            sudo chown -R poma:poma /opt/poma
            cd /opt/poma
            # IB Gateway runtime (binaries, GUI packages, helpers, systemd service) is owned by
            # the IB Gateway Ops workflow, which Auto CI/CD runs right after this deploy. Keeping
            # it out of the deploy keeps this step to app concerns only (build + smoke + cron).
            sudo -u poma env RUN_DEPLOY_SMOKE=${{ inputs.deploy_smoke }} bash ops/scripts/deploy.sh
            sudo -u poma crontab ops/cron/poma.cron
          '

      - name: Notify Telegram (deployment result)
        if: ${{ always() }}
        uses: ./.github/actions/telegram-notify
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: >-
            POMA[${{ inputs.deploy_environment }}] deploy ${{ job.status }} —
            terraform=${{ inputs.terraform_action }}, app=${{ inputs.deploy_app }},
            mode=${{ inputs.trading_mode }}, provider=${{ inputs.data_provider }}
            (${{ github.sha }})
