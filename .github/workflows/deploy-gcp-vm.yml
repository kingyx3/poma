name: Deploy GCP e2-micro VM

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: GitHub Environment to deploy.
        required: true
        type: choice
        options:
          - dev
          - stg
          - prd
        default: dev
      terraform_action:
        description: Run Terraform plan only, or apply and deploy.
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan
      deploy_app:
        description: Upload code and rendered .env after Terraform apply.
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: poma-gcp-free-tier-deploy-${{ inputs.deploy_environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Terraform and deploy (${{ inputs.deploy_environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_environment }}
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      DEPLOY_ENVIRONMENT: ${{ inputs.deploy_environment }}

      # Terraform / GCP configuration from GitHub Variables.
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_ZONE: ${{ vars.GCP_ZONE }}
      GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      # POMA runtime .env values from GitHub Variables.
      APP_ENV: ${{ vars.APP_ENV }}
      TRADING_MODE: ${{ vars.TRADING_MODE }}
      ALLOW_LIVE_TRADING: ${{ vars.ALLOW_LIVE_TRADING }}
      MARKET_CALENDAR: ${{ vars.MARKET_CALENDAR }}
      REBALANCE_AFTER_OPEN_MINUTES: ${{ vars.REBALANCE_AFTER_OPEN_MINUTES }}
      UNIVERSE: ${{ vars.UNIVERSE }}
      RANK_LOOKBACK_DAYS: ${{ vars.RANK_LOOKBACK_DAYS }}
      MAX_HOLDINGS: ${{ vars.MAX_HOLDINGS }}
      PORTFOLIO_VALUE_USD: ${{ vars.PORTFOLIO_VALUE_USD }}
      CASH_BUFFER_PCT: ${{ vars.CASH_BUFFER_PCT }}
      MAX_POSITION_PCT: ${{ vars.MAX_POSITION_PCT }}
      MAX_TURNOVER_PCT: ${{ vars.MAX_TURNOVER_PCT }}
      MIN_TRADE_NOTIONAL_USD: ${{ vars.MIN_TRADE_NOTIONAL_USD }}
      MIN_WEIGHT_DELTA_PCT: ${{ vars.MIN_WEIGHT_DELTA_PCT }}
      ORDER_TYPE: ${{ vars.ORDER_TYPE }}
      ALLOW_MARKET_ORDERS: ${{ vars.ALLOW_MARKET_ORDERS }}
      LIMIT_OFFSET_BPS: ${{ vars.LIMIT_OFFSET_BPS }}
      MAX_ORDER_NOTIONAL_USD: ${{ vars.MAX_ORDER_NOTIONAL_USD }}
      MAX_DAILY_TRADES: ${{ vars.MAX_DAILY_TRADES }}
      ORDER_STATUS_TIMEOUT_SECONDS: ${{ vars.ORDER_STATUS_TIMEOUT_SECONDS }}
      CANCEL_STALE_ORDERS: ${{ vars.CANCEL_STALE_ORDERS }}
      DATA_PROVIDER: ${{ vars.DATA_PROVIDER }}
      FMP_BASE_URL: ${{ vars.FMP_BASE_URL }}
      IBKR_HOST: ${{ vars.IBKR_HOST }}
      IBKR_PORT: ${{ vars.IBKR_PORT }}
      IBKR_CLIENT_ID: ${{ vars.IBKR_CLIENT_ID }}
      STATE_DIR: ${{ vars.STATE_DIR }}
      REPORT_DIR: ${{ vars.REPORT_DIR }}

      # POMA runtime .env secrets from GitHub Secrets.
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      IBKR_ACCOUNT: ${{ secrets.IBKR_ACCOUNT }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Validate required deployment settings
        run: |
          set -euo pipefail
          required=(
            GCP_PROJECT_ID
            GCP_REGION
            GCP_ZONE
            GCP_VM_NAME
            TF_STATE_BUCKET
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT_EMAIL
          )
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing GitHub variable for ${DEPLOY_ENVIRONMENT}: ${key}"
              exit 1
            fi
          done
          if [ "${APP_ENV}" != "${DEPLOY_ENVIRONMENT}" ]; then
            echo "::error::APP_ENV=${APP_ENV} must match deploy_environment=${DEPLOY_ENVIRONMENT}"
            exit 1
          fi

      - name: Render .env from GitHub variables and secrets
        run: python ops/scripts/render_env.py --strict-env --output .env.deploy

      - name: Install app for FMP provider validation
        if: ${{ env.DATA_PROVIDER == 'fmp' }}
        run: pip install -e .

      - name: Validate FMP data provider output
        if: ${{ env.DATA_PROVIDER == 'fmp' }}
        run: python ops/scripts/validate_data_provider.py

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform -chdir=infra/gcp-free-tier init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=poma/${DEPLOY_ENVIRONMENT}/gcp-free-tier"

      - name: Terraform format check
        run: terraform -chdir=infra/gcp-free-tier fmt -check -recursive

      - name: Terraform validate
        run: terraform -chdir=infra/gcp-free-tier validate

      - name: Terraform plan
        run: |
          terraform -chdir=infra/gcp-free-tier plan -out=tfplan \
            -var="project_id=${GCP_PROJECT_ID}" \
            -var="region=${GCP_REGION}" \
            -var="zone=${GCP_ZONE}" \
            -var="instance_name=${GCP_VM_NAME}"

      - name: Terraform apply
        if: ${{ inputs.terraform_action == 'apply' }}
        run: terraform -chdir=infra/gcp-free-tier apply -auto-approve tfplan

      - name: Package application
        if: ${{ inputs.terraform_action == 'apply' && inputs.deploy_app }}
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='.env' \
            --exclude='.env.deploy' \
            --exclude='reports' \
            --exclude='state' \
            --exclude='logs' \
            -czf /tmp/poma.tar.gz .

      - name: Upload and install on VM
        if: ${{ inputs.terraform_action == 'apply' && inputs.deploy_app }}
        run: |
          set -euo pipefail

          instance_name="$(terraform -chdir=infra/gcp-free-tier output -raw instance_name)"
          zone="$(terraform -chdir=infra/gcp-free-tier output -raw zone)"
          ssh_common=(--zone "${zone}" --tunnel-through-iap --ssh-key-expire-after=15m --quiet)

          gcloud compute ssh "${instance_name}" "${ssh_common[@]}" --command \
            'while [ ! -f /var/lib/cloud/instance/boot-finished ]; do sleep 5; done'

          gcloud compute scp /tmp/poma.tar.gz "${instance_name}:/tmp/poma.tar.gz" "${ssh_common[@]}"
          gcloud compute scp .env.deploy "${instance_name}:/tmp/poma.env" "${ssh_common[@]}"

          gcloud compute ssh "${instance_name}" "${ssh_common[@]}" --command '
            set -euo pipefail
            sudo mkdir -p /opt/poma
            sudo tar -xzf /tmp/poma.tar.gz -C /opt/poma
            sudo mv /tmp/poma.env /opt/poma/.env
            sudo chmod 600 /opt/poma/.env
            sudo chown -R poma:poma /opt/poma
            cd /opt/poma
            sudo -u poma bash ops/scripts/deploy.sh
            sudo -u poma crontab ops/cron/poma.cron
          '
