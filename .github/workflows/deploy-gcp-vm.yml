name: Deploy GCP e2-micro VM

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: GitHub Environment to deploy.
        required: true
        type: choice
        options:
          - dev
          - stg
          - prd
        default: dev
      terraform_action:
        description: Run Terraform plan only, or apply and deploy.
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan
      deploy_app:
        description: Upload code and rendered .env after Terraform apply.
        required: true
        type: boolean
        default: true
      trading_mode:
        description: Runtime mode for the rendered VM .env.
        required: true
        type: choice
        options:
          - dry_run
          - paper
          - live
        default: dry_run
      data_provider:
        description: Market-data provider for the rendered VM .env.
        required: true
        type: choice
        options:
          - fixture
          - yahoo
        default: yahoo
      allow_live_trading:
        description: Must be true when trading_mode=live.
        required: true
        type: boolean
        default: false
      deploy_smoke:
        description: Run the on-VM dry-run smoke test after pulling the image.
        required: false
        type: boolean
        default: true
      image:
        description: Full image ref to pull on the VM (blank = ghcr.io/kingyx3/poma:main).
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      deploy_environment:
        required: true
        type: string
      terraform_action:
        required: false
        type: string
        default: apply
      deploy_app:
        required: false
        type: boolean
        default: true
      trading_mode:
        required: false
        type: string
        default: dry_run
      data_provider:
        required: false
        type: string
        default: yahoo
      allow_live_trading:
        required: false
        type: boolean
        default: false
      deploy_smoke:
        required: false
        type: boolean
        default: true
      image:
        required: false
        type: string
        default: ''

permissions:
  contents: read
  id-token: write

concurrency:
  group: poma-gcp-free-tier-deploy-${{ inputs.deploy_environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Terraform and deploy (${{ inputs.deploy_environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: ${{ inputs.deploy_environment }}
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      DEPLOY_ENVIRONMENT: ${{ inputs.deploy_environment }}
      INPUT_TERRAFORM_ACTION: ${{ inputs.terraform_action }}
      INPUT_TRADING_MODE: ${{ inputs.trading_mode }}
      INPUT_DATA_PROVIDER: ${{ inputs.data_provider }}
      INPUT_ALLOW_LIVE_TRADING: ${{ inputs.allow_live_trading }}
      INPUT_IMAGE: ${{ inputs.image }}

      # Minimal runtime secrets. Telegram is mandatory; IBKR is required by selected modes.
      IBKR_ACCOUNT: ${{ secrets.IBKR_ACCOUNT }}
      IBKR_ACCOUNT_PAPER: ${{ secrets.IBKR_ACCOUNT_PAPER }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve generated deployment config and CI defaults
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          source ops/scripts/resolve_gcp_deploy_env.sh

          set_env APP_ENV "${DEPLOY_ENVIRONMENT}"
          if [ "${APP_ENV}" != "${DEPLOY_ENVIRONMENT}" ]; then
            echo "::error::APP_ENV=${APP_ENV} must match deploy_environment=${DEPLOY_ENVIRONMENT}"
            exit 1
          fi
          set_env TRADING_MODE "${INPUT_TRADING_MODE}"
          set_env ALLOW_LIVE_TRADING "${INPUT_ALLOW_LIVE_TRADING}"
          set_default MARKET_CALENDAR "NASDAQ"
          set_default REBALANCE_AFTER_OPEN_MINUTES "10"
          case "${INPUT_DATA_PROVIDER}" in
            fixture|yahoo)
              set_env DATA_PROVIDER "${INPUT_DATA_PROVIDER}"
              ;;
            *)
              echo "::error::unsupported data_provider=${INPUT_DATA_PROVIDER}; use fixture or yahoo"
              exit 1
              ;;
          esac
          set_default UNIVERSE "us_top_market_cap"
          set_default RANK_LOOKBACK_DAYS "90"
          set_default MAX_HOLDINGS "100"
          set_default STRATEGY_ALLOCATIONS "rank_velocity_size_equal_weight=0.98,cash=0.02"
          set_default DRY_RUN_PORTFOLIO_VALUE_USD "10000"
          set_default MANAGED_CAP_MODE "broker_total"
          set_default MANAGED_CAP_USD "0"
          set_default MAX_POSITION_PCT "0.10"
          set_default MAX_TURNOVER_PCT "1.0"
          set_default MIN_TRADE_NOTIONAL_USD "25"
          set_default MIN_WEIGHT_DELTA_PCT "0.0025"
          set_default ORDER_TYPE "limit"
          set_default ALLOW_MARKET_ORDERS "false"
          set_default LIMIT_OFFSET_BPS "10"
          set_default MAX_ORDER_NOTIONAL_USD "2000"
          set_default MAX_DAILY_TRADES "100"
          set_default ORDER_STATUS_TIMEOUT_SECONDS "60"
          set_default CANCEL_STALE_ORDERS "true"
          set_default YAHOO_SCREENER_LIMIT "500"
          set_default YAHOO_SCREENER_PAGE_SIZE "250"
          set_default IBKR_HOST "127.0.0.1"
          set_default IBKR_PORT "7497"
          set_default IBKR_CLIENT_ID "101"
          set_default STATE_DIR "state"
          set_default DATA_DIR "data"
          set_default REPORT_DIR "reports"

          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID GitHub Environment secrets are required"
            exit 1
          fi
          case "${TRADING_MODE}" in
            paper)
              if [ -z "${IBKR_ACCOUNT_PAPER:-}" ]; then
                echo "::error::IBKR_ACCOUNT_PAPER GitHub Environment secret is required when TRADING_MODE=paper"
                exit 1
              fi
              set_env IBKR_ACCOUNT "${IBKR_ACCOUNT_PAPER}"
              ;;
            live)
              if [ -z "${IBKR_ACCOUNT:-}" ]; then
                echo "::error::IBKR_ACCOUNT GitHub Environment secret is required when TRADING_MODE=live"
                exit 1
              fi
              ;;
            dry_run)
              if [ -n "${IBKR_ACCOUNT_PAPER:-}" ]; then
                set_env IBKR_ACCOUNT "${IBKR_ACCOUNT_PAPER}"
              elif [ -z "${IBKR_ACCOUNT:-}" ]; then
                echo "::error::IBKR_ACCOUNT_PAPER or IBKR_ACCOUNT GitHub Environment secret is required for deploy .env rendering"
                exit 1
              fi
              ;;
          esac
          if [ "${TRADING_MODE}" = "live" ] && [ "${ALLOW_LIVE_TRADING}" != "true" ]; then
            echo "::error::trading_mode=live requires allow_live_trading=true"
            exit 1
          fi

          echo "Resolved ${DEPLOY_ENVIRONMENT}: project=${GCP_PROJECT_ID}, region=${GCP_REGION}, zone=${GCP_ZONE}, state_bucket=${TF_STATE_BUCKET}, trading_mode=${TRADING_MODE}, data_provider=${DATA_PROVIDER}"

      - name: Render .env from CI defaults and GitHub secrets
        run: |
          timeout --kill-after=30s 2m python ops/scripts/render_env.py --strict-env --output .env.deploy || {
            echo "::error::render_env.py timed out or failed while rendering deployment .env"
            exit 1
          }

      - name: Validate rendered runtime config
        run: |
          set -euo pipefail
          timeout --kill-after=30s 2m pip install -e . || {
            echo "::error::Dependency install timed out while preparing runtime config validation"
            exit 1
          }
          timeout --kill-after=30s 2m python ops/scripts/validate_runtime_config.py --env-file .env.deploy || {
            echo "::error::Rendered runtime config failed validation"
            exit 1
          }

      - name: Validate market data provider output
        run: |
          set -euo pipefail
          if [ "${DATA_PROVIDER}" = "fixture" ]; then
            echo "Skipping external provider validation because DATA_PROVIDER=${DATA_PROVIDER}"
            exit 0
          fi
          timeout --kill-after=30s 5m python ops/scripts/validate_data_provider.py || {
            echo "::error::Market data provider validation timed out or failed"
            exit 1
          }

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure gcloud project
        run: |
          timeout --kill-after=30s 2m gcloud config set project "${GCP_PROJECT_ID}" || {
            echo "::error::gcloud project configuration timed out or failed"
            exit 1
          }

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: |
          set -euo pipefail
          timeout --kill-after=30s 5m terraform -chdir=infra/gcp-free-tier init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=poma/${DEPLOY_ENVIRONMENT}/gcp-free-tier" || {
              echo "::error::Terraform init timed out or failed"
              exit 1
            }

      # terraform fmt -check and validate run in ci.yml on every PR (covering both modules), so
      # they are not repeated here; `terraform plan` below still surfaces any config errors.
      - name: Terraform plan
        run: |
          set -euo pipefail
          timeout --kill-after=30s 10m terraform -chdir=infra/gcp-free-tier plan -out=tfplan \
            -var="project_id=${GCP_PROJECT_ID}" \
            -var="region=${GCP_REGION}" \
            -var="zone=${GCP_ZONE}" \
            -var="instance_name=${GCP_VM_NAME}" || {
              echo "::error::Terraform plan timed out or failed"
              exit 1
            }

      - name: Terraform apply
        if: ${{ inputs.terraform_action == 'apply' }}
        run: |
          set -euo pipefail
          timeout --kill-after=30s 20m terraform -chdir=infra/gcp-free-tier apply -auto-approve tfplan || {
            echo "::error::Terraform apply timed out or failed"
            exit 1
          }

      - name: Package application
        if: ${{ inputs.terraform_action == 'apply' && inputs.deploy_app }}
        run: |
          set -euo pipefail
          # Ship only the runtime files required on the VM. Avoid uploading CI/test/docs/git
          # history so IAP transfer and on-VM Docker pull/smoke contexts stay small.
          timeout --kill-after=30s 2m tar \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            -czf /tmp/poma.tar.gz \
            .dockerignore \
            Dockerfile \
            README.md \
            docker-compose.vm.yml \
            docker-compose.yml \
            pyproject.toml \
            src \
            ops/cron \
            ops/scripts/deploy.sh || {
              echo "::error::Runtime package creation timed out or failed"
              exit 1
            }
          echo "Packaged runtime archive: $(du -h /tmp/poma.tar.gz | awk '{print $1}')"

      - name: Upload and install on VM
        if: ${{ inputs.terraform_action == 'apply' && inputs.deploy_app }}
        timeout-minutes: 55
        run: |
          set -euo pipefail

          instance_name="$(terraform -chdir=infra/gcp-free-tier output -raw instance_name)"
          zone="$(terraform -chdir=infra/gcp-free-tier output -raw zone)"
          startup_revision="$(terraform -chdir=infra/gcp-free-tier output -raw startup_revision)"
          ssh_common=(--zone "${zone}" --tunnel-through-iap --ssh-key-expire-after=15m --quiet)
          step_start="${SECONDS}"

          # Validate the requested image ref before it is interpolated into the remote shell
          # command. An empty value is allowed and makes the VM fall back to deploy.sh's
          # default (ghcr.io/kingyx3/poma:main); a non-empty value must be a plain registry
          # reference so it cannot smuggle shell metacharacters onto the VM.
          if [ -n "${INPUT_IMAGE}" ] && ! printf '%s' "${INPUT_IMAGE}" | grep -Eq '^[A-Za-z0-9._/-]+:[A-Za-z0-9._-]+$'; then
            echo "::error::Refusing to deploy malformed image ref: ${INPUT_IMAGE}"
            exit 1
          fi
          echo "Deploying image: ${INPUT_IMAGE:-ghcr.io/kingyx3/poma:main (default)}"

          timed() {
            local label="$1" start status
            shift
            start="${SECONDS}"
            echo "::group::${label}"
            set +e
            "$@"
            status="$?"
            set -e
            echo "::endgroup::"
            echo "TIMING ${label}: $((SECONDS - start))s (status=${status})"
            if [ "${status}" -eq 124 ]; then
              echo "::error::${label} timed out; check VM readiness, IAP/SSH connectivity, Docker image pull, or smoke-test health."
            fi
            return "${status}"
          }

          run_with_timeout() {
            local seconds="$1"
            shift
            timeout --kill-after=30s "${seconds}" "$@"
          }

          print_vm_bootstrap_status() {
            run_with_timeout 45s gcloud compute ssh "${instance_name}" "${ssh_common[@]}" --command '
              set +e
              echo "===== POMA VM bootstrap status ====="
              echo "sentinel=$(cat /var/lib/poma/vm-ready 2>/dev/null || true)"
              echo "startup_failed=$(cat /var/lib/poma/vm-startup-failed 2>/dev/null || true)"
              echo "boot_id=$(cat /proc/sys/kernel/random/boot_id 2>/dev/null || true)"
              id poma || true
              systemctl is-active docker cron || true
              systemctl --no-pager --full status google-startup-scripts.service google-guest-agent.service docker cron || true
              journalctl --no-pager -n 160 -u google-startup-scripts.service -u google-guest-agent.service -u docker -u cron || true
            ' || true
          }

          # Poll the VM over IAP until the POMA startup readiness sentinel matches this
          # deploy's startup revision and the app user plus Docker/cron services exist. Each
          # probe is a short, independently timed SSH, so a cold boot or a transient
          # IAP/SSH-key-propagation hang is retried with a fresh connection. Do not accept
          # cloud-init's boot-finished marker by itself: the Google metadata startup script can
          # still be running, and deploy needs the concrete POMA host contract.
          wait_for_vm_ready() {
            local deadline=$((SECONDS + 600)) attempt=0 status=1
            while true; do
              set +e
              run_with_timeout 75s gcloud compute ssh "${instance_name}" "${ssh_common[@]}" \
                --command "startup_failed=\"\$(cat /var/lib/poma/vm-startup-failed 2>/dev/null || true)\"; if [ -n \"\${startup_failed}\" ]; then echo \"startup_failed=\${startup_failed}\" >&2; exit 42; fi; sentinel=\"\$(cat /var/lib/poma/vm-ready 2>/dev/null || true)\"; boot_id=\"\$(cat /proc/sys/kernel/random/boot_id)\"; test \"\${sentinel}\" = \"${startup_revision} \${boot_id}\" && id poma >/dev/null 2>&1 && systemctl is-active --quiet docker && systemctl is-active --quiet cron"
              status="$?"
              set -e
              if [ "${status}" -eq 0 ]; then
                return 0
              fi
              if [ "${status}" -eq 42 ]; then
                echo "::error::VM startup script failed before writing the readiness sentinel."
                print_vm_bootstrap_status
                return 1
              fi
              if [ "${SECONDS}" -ge "${deadline}" ]; then
                echo "VM ${instance_name} not reachable or startup revision ${startup_revision} not ready within 10m." >&2
                print_vm_bootstrap_status
                return 1
              fi
              attempt=$((attempt + 1))
              echo "VM not ready yet (attempt ${attempt}); retrying in 15s..."
              sleep 15
            done
          }

          # Self-heal a wedged VM: if it never becomes reachable (e.g. a prior boot exhausted the
          # 1 GB e2-micro and left SSH dead), reset it once. A reboot reruns the minimal startup
          # script from metadata and clears the hung/OOM state. terraform_data.startup_revision
          # separately recreates the VM whenever startup.sh changes, so this only covers transient
          # or wedged states, not config drift.
          ensure_vm_ready() {
            if wait_for_vm_ready; then
              return 0
            fi
            echo "Resetting ${instance_name} once and waiting for it to come back."
            run_with_timeout 3m gcloud compute instances reset "${instance_name}" --zone "${zone}" --quiet || true
            wait_for_vm_ready
          }

          retry_with_backoff() {
            local timeout_duration="$1" label="$2" max_attempts="$3"
            shift 3

            local attempt=1
            until run_with_timeout "${timeout_duration}" "$@"; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "${label} failed after ${attempt} attempt(s)." >&2
                return 1
              fi
              attempt=$((attempt + 1))
              echo "${label} failed; retrying attempt ${attempt}/${max_attempts} in 15s..."
              sleep 15
            done
          }

          timed "VM readiness" ensure_vm_ready

          timed "App package upload" retry_with_backoff 3m "App package upload" 3 \
            gcloud compute scp /tmp/poma.tar.gz "${instance_name}:/tmp/poma.tar.gz" "${ssh_common[@]}"
          timed "Environment upload" retry_with_backoff 2m "Environment upload" 3 \
            gcloud compute scp .env.deploy "${instance_name}:/tmp/poma.env" "${ssh_common[@]}"

          timed "Remote install, Docker pull, smoke, cron" run_with_timeout 25m \
            gcloud compute ssh "${instance_name}" "${ssh_common[@]}" --command '
            set -euo pipefail

            remote_started="$(date +%s)"
            remote_failure_diagnostics() {
              local status="$?"
              if [ "${status}" -eq 0 ]; then
                return 0
              fi
              echo "REMOTE FAILURE status=${status}; collecting deploy diagnostics" >&2
              pwd >&2 || true
              id poma >&2 || true
              sudo -u poma id >&2 || true
              ls -la /opt/poma >&2 || true
              find /opt/poma -maxdepth 2 -mindepth 1 -printf "%M %u:%g %p\n" 2>/dev/null | sort >&2 || true
              docker --version >&2 || true
              docker compose version >&2 || true
              systemctl is-active docker cron >&2 || true
              df -h / /opt/poma >&2 || true
              docker system df >&2 || true
              if [ -f /opt/poma/.compose.env ]; then
                sed "s/^POMA_IMAGE=.*/POMA_IMAGE=<redacted>/" /opt/poma/.compose.env >&2 || true
              fi
              exit "${status}"
            }
            trap remote_failure_diagnostics EXIT

            remote_timed() {
              local label="$1" status start
              shift
              start="$(date +%s)"
              echo "REMOTE TIMING BEGIN ${label}"
              set +e
              "$@"
              status="$?"
              set -e
              echo "REMOTE TIMING END ${label}: $(( $(date +%s) - start ))s (status=${status})"
              return "${status}"
            }

            remote_retry_with_backoff() {
              local label="$1" max_attempts="$2" attempt=1
              shift 2
              until "$@"; do
                if [ "${attempt}" -ge "${max_attempts}" ]; then
                  echo "${label} failed after ${attempt} remote attempt(s)." >&2
                  return 1
                fi
                attempt=$((attempt + 1))
                echo "${label} failed; retrying remote attempt ${attempt}/${max_attempts} in 20s..." >&2
                sleep 20
              done
            }

            remote_timed "Prepare app directory" sudo mkdir -p /opt/poma
            # Remove files owned by the deploy package before extracting the trimmed runtime set.
            # Preserve .env plus runtime data/report/state/log directories across deploys.
            remote_timed "Remove old deployed package files" sudo rm -rf \
              /opt/poma/.dockerignore \
              /opt/poma/.git \
              /opt/poma/.github \
              /opt/poma/Dockerfile \
              /opt/poma/README.md \
              /opt/poma/docker-compose.vm.yml \
              /opt/poma/docker-compose.yml \
              /opt/poma/docs \
              /opt/poma/infra \
              /opt/poma/ops \
              /opt/poma/pyproject.toml \
              /opt/poma/src \
              /opt/poma/tests
            remote_timed "Extract application package" sudo tar -xzf /tmp/poma.tar.gz -C /opt/poma
            remote_timed "Install rendered environment" sudo mv /tmp/poma.env /opt/poma/.env
            remote_timed "Secure rendered environment" sudo chmod 600 /opt/poma/.env
            remote_timed "Ensure runtime state directories" sudo install -d -o poma -g poma \
              /opt/poma/data \
              /opt/poma/logs \
              /opt/poma/reports \
              /opt/poma/state
            # Keep deploy fast on long-lived VMs: do not recursively chown data/reports/state/logs.
            # Only the freshly extracted package and .env need ownership fixed on each deploy.
            remote_timed "Fix package ownership" sudo chown poma:poma /opt/poma /opt/poma/.env
            remote_timed "Fix extracted file ownership" sudo chown -R poma:poma \
              /opt/poma/.dockerignore \
              /opt/poma/Dockerfile \
              /opt/poma/README.md \
              /opt/poma/docker-compose.vm.yml \
              /opt/poma/docker-compose.yml \
              /opt/poma/ops \
              /opt/poma/pyproject.toml \
              /opt/poma/src
            cd /opt/poma
            # IB Gateway runtime (binaries, GUI packages, helpers, systemd service) is owned by
            # the IB Gateway Ops workflow, which Auto CI/CD runs right after this deploy. Keeping
            # it out of the deploy keeps this step to app concerns only (image pull + smoke + cron).
            remote_retry_with_backoff "Docker pull and smoke test" 2 \
              remote_timed "Docker pull and smoke test" sudo -u poma env RUN_DEPLOY_SMOKE=${{ inputs.deploy_smoke }} POMA_IMAGE=${{ inputs.image }} bash ops/scripts/deploy.sh
            remote_timed "Install cron schedule" sudo -u poma crontab ops/cron/poma.cron
            echo "REMOTE TIMING total: $(( $(date +%s) - remote_started ))s"
          '

          echo "TIMING Upload and install on VM total: $((SECONDS - step_start))s"

      - name: Notify Telegram (deployment result)
        if: ${{ always() }}
        uses: ./.github/actions/telegram-notify
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: >-
            POMA[${{ inputs.deploy_environment }}] deploy ${{ job.status }} —
            terraform=${{ inputs.terraform_action }}, app=${{ inputs.deploy_app }},
            mode=${{ inputs.trading_mode }}, provider=${{ inputs.data_provider }}
            (${{ github.sha }})
