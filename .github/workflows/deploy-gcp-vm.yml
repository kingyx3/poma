name: Deploy GCP e2-micro VM

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: GitHub Environment to deploy.
        required: true
        type: choice
        options:
          - dev
          - stg
          - prd
        default: dev
      terraform_action:
        description: Run Terraform plan only, or apply and deploy.
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan
      deploy_app:
        description: Upload code and rendered .env after Terraform apply.
        required: true
        type: boolean
        default: true
      tailscale_enabled:
        description: Join the VPS to Tailscale after Terraform apply.
        required: true
        type: boolean
        default: true
      trading_mode:
        description: Runtime mode for the rendered VM .env.
        required: true
        type: choice
        options:
          - dry_run
          - paper
          - live
        default: dry_run
      data_provider:
        description: Market-data provider for the rendered VM .env.
        required: true
        type: choice
        options:
          - fixture
          - yahoo
        default: yahoo
      allow_live_trading:
        description: Must be true when trading_mode=live.
        required: true
        type: boolean
        default: false
      deploy_smoke:
        description: Run the on-VM dry-run smoke test after building the image.
        required: false
        type: boolean
        default: true
  workflow_call:
    inputs:
      deploy_environment:
        required: true
        type: string
      terraform_action:
        required: false
        type: string
        default: apply
      deploy_app:
        required: false
        type: boolean
        default: true
      tailscale_enabled:
        required: false
        type: boolean
        default: true
      trading_mode:
        required: false
        type: string
        default: dry_run
      data_provider:
        required: false
        type: string
        default: yahoo
      allow_live_trading:
        required: false
        type: boolean
        default: false
      deploy_smoke:
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: poma-gcp-free-tier-deploy-${{ inputs.deploy_environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Terraform and deploy (${{ inputs.deploy_environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ inputs.deploy_environment }}
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      DEPLOY_ENVIRONMENT: ${{ inputs.deploy_environment }}
      INPUT_TERRAFORM_ACTION: ${{ inputs.terraform_action }}
      INPUT_TAILSCALE_ENABLED: ${{ inputs.tailscale_enabled }}
      INPUT_TRADING_MODE: ${{ inputs.trading_mode }}
      INPUT_DATA_PROVIDER: ${{ inputs.data_provider }}
      INPUT_ALLOW_LIVE_TRADING: ${{ inputs.allow_live_trading }}

      # Minimal runtime secrets. Telegram is mandatory; IBKR is required by selected modes.
      IBKR_ACCOUNT: ${{ secrets.IBKR_ACCOUNT }}
      IBKR_ACCOUNT_PAPER: ${{ secrets.IBKR_ACCOUNT_PAPER }}
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve generated deployment config and CI defaults
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          source ops/scripts/resolve_gcp_deploy_env.sh

          set_env APP_ENV "${DEPLOY_ENVIRONMENT}"
          if [ "${APP_ENV}" != "${DEPLOY_ENVIRONMENT}" ]; then
            echo "::error::APP_ENV=${APP_ENV} must match deploy_environment=${DEPLOY_ENVIRONMENT}"
            exit 1
          fi
          set_env TRADING_MODE "${INPUT_TRADING_MODE}"
          set_env ALLOW_LIVE_TRADING "${INPUT_ALLOW_LIVE_TRADING}"
          set_default MARKET_CALENDAR "NASDAQ"
          set_default REBALANCE_AFTER_OPEN_MINUTES "10"
          case "${INPUT_DATA_PROVIDER}" in
            fixture|yahoo)
              set_env DATA_PROVIDER "${INPUT_DATA_PROVIDER}"
              ;;
            *)
              echo "::error::unsupported data_provider=${INPUT_DATA_PROVIDER}; use fixture or yahoo"
              exit 1
              ;;
          esac
          set_default UNIVERSE "us_top_market_cap"
          set_default RANK_LOOKBACK_DAYS "90"
          set_default MAX_HOLDINGS "100"
          set_default PORTFOLIO_VALUE_USD "10000"
          set_default CASH_BUFFER_PCT "0.02"
          set_default MAX_POSITION_PCT "0.10"
          set_default MAX_TURNOVER_PCT "0.35"
          set_default MIN_TRADE_NOTIONAL_USD "25"
          set_default MIN_WEIGHT_DELTA_PCT "0.0025"
          set_default ORDER_TYPE "limit"
          set_default ALLOW_MARKET_ORDERS "false"
          set_default LIMIT_OFFSET_BPS "10"
          set_default MAX_ORDER_NOTIONAL_USD "2000"
          set_default MAX_DAILY_TRADES "100"
          set_default ORDER_STATUS_TIMEOUT_SECONDS "60"
          set_default CANCEL_STALE_ORDERS "true"
          set_default YAHOO_SCREENER_LIMIT "500"
          set_default YAHOO_SCREENER_PAGE_SIZE "250"
          set_default IBKR_HOST "127.0.0.1"
          set_default IBKR_PORT "7497"
          set_default IBKR_CLIENT_ID "101"
          set_default STATE_DIR "state"
          set_default DATA_DIR "data"
          set_default REPORT_DIR "reports"

          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID GitHub Environment secrets are required"
            exit 1
          fi
          case "${TRADING_MODE}" in
            paper)
              if [ -z "${IBKR_ACCOUNT_PAPER:-}" ]; then
                echo "::error::IBKR_ACCOUNT_PAPER GitHub Environment secret is required when TRADING_MODE=paper"
                exit 1
              fi
              set_env IBKR_ACCOUNT "${IBKR_ACCOUNT_PAPER}"
              ;;
            live)
              if [ -z "${IBKR_ACCOUNT:-}" ]; then
                echo "::error::IBKR_ACCOUNT GitHub Environment secret is required when TRADING_MODE=live"
                exit 1
              fi
              ;;
            dry_run)
              if [ -n "${IBKR_ACCOUNT_PAPER:-}" ]; then
                set_env IBKR_ACCOUNT "${IBKR_ACCOUNT_PAPER}"
              elif [ -z "${IBKR_ACCOUNT:-}" ]; then
                echo "::error::IBKR_ACCOUNT_PAPER or IBKR_ACCOUNT GitHub Environment secret is required for deploy .env rendering"
                exit 1
              fi
              ;;
          esac
          if [ "${TRADING_MODE}" = "live" ] && [ "${ALLOW_LIVE_TRADING}" != "true" ]; then
            echo "::error::trading_mode=live requires allow_live_trading=true"
            exit 1
          fi
          if [ "${INPUT_TAILSCALE_ENABLED}" = "true" ] && [ "${INPUT_TERRAFORM_ACTION}" = "apply" ] && [ -z "${TAILSCALE_AUTHKEY:-}" ]; then
            echo "::error::TAILSCALE_AUTHKEY GitHub Environment secret is required when tailscale_enabled=true and terraform_action=apply"
            exit 1
          fi

          echo "Resolved ${DEPLOY_ENVIRONMENT}: project=${GCP_PROJECT_ID}, region=${GCP_REGION}, zone=${GCP_ZONE}, state_bucket=${TF_STATE_BUCKET}, trading_mode=${TRADING_MODE}, data_provider=${DATA_PROVIDER}, tailscale_enabled=${INPUT_TAILSCALE_ENABLED}"

      - name: Render .env from CI defaults and GitHub secrets
        run: python ops/scripts/render_env.py --strict-env --output .env.deploy

      - name: Validate market data provider output
        run: |
          set -euo pipefail
          if [ "${DATA_PROVIDER}" = "fixture" ]; then
            echo "Skipping external provider validation because DATA_PROVIDER=${DATA_PROVIDER}"
            exit 0
          fi
          pip install -e .
          python ops/scripts/validate_data_provider.py

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure gcloud project
        run: gcloud config set project "${GCP_PROJECT_ID}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform -chdir=infra/gcp-free-tier init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=poma/${DEPLOY_ENVIRONMENT}/gcp-free-tier"

      # terraform fmt -check and validate run in ci.yml on every PR (covering both modules), so
      # they are not repeated here; `terraform plan` below still surfaces any config errors.
      - name: Terraform plan
        run: |
          terraform -chdir=infra/gcp-free-tier plan -out=tfplan \
            -var="project_id=${GCP_PROJECT_ID}" \
            -var="region=${GCP_REGION}" \
            -var="zone=${GCP_ZONE}" \
            -var="instance_name=${GCP_VM_NAME}"

      - name: Terraform apply
        if: ${{ inputs.terraform_action == 'apply' }}
        run: terraform -chdir=infra/gcp-free-tier apply -auto-approve tfplan

      - name: Configure Tailscale on VM
        if: ${{ inputs.terraform_action == 'apply' && inputs.tailscale_enabled }}
        timeout-minutes: 15
        run: |
          set -euo pipefail

          instance_name="$(terraform -chdir=infra/gcp-free-tier output -raw instance_name)"
          zone="$(terraform -chdir=infra/gcp-free-tier output -raw zone)"
          tailscale_hostname="${instance_name}"
          ssh_common=(--zone "${zone}" --tunnel-through-iap --ssh-key-expire-after=15m --quiet)

          run_with_timeout() {
            local seconds="$1"
            shift
            timeout --kill-after=30s "${seconds}" "$@"
          }

          auth_key_file="$(mktemp)"
          remote_script="$(mktemp)"
          cleanup() {
            rm -f "${auth_key_file}" "${remote_script}"
          }
          trap cleanup EXIT

          printf '%s' "${TAILSCALE_AUTHKEY}" > "${auth_key_file}"
          chmod 600 "${auth_key_file}"
          cat > "${remote_script}" <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          cleanup() {
            rm -f /tmp/poma-tailscale-authkey /run/poma-tailscale-authkey /tmp/poma-configure-tailscale.sh
          }
          trap cleanup EXIT

          run_with_timeout() {
            local seconds="$1"
            shift
            timeout --kill-after=30s "${seconds}" "$@"
          }

          apt_locks_busy() {
            if command -v fuser >/dev/null 2>&1; then
              fuser /var/lib/dpkg/lock-frontend \
                /var/lib/dpkg/lock \
                /var/lib/apt/lists/lock \
                /var/cache/apt/archives/lock >/dev/null 2>&1
              return $?
            fi

            pgrep -f '(apt-get|apt.systemd.daily|dpkg|unattended-upgrade)' >/dev/null 2>&1
          }

          wait_for_apt() {
            local context="${1:-apt operation}"
            local waited_seconds=0
            local max_wait_seconds=600

            while apt_locks_busy; do
              if [ "${waited_seconds}" -ge "${max_wait_seconds}" ]; then
                echo "Timed out waiting for apt/dpkg locks before ${context}." >&2
                exit 1
              fi

              echo "Waiting for apt/dpkg locks to be released before ${context}..."
              sleep 10
              waited_seconds=$((waited_seconds + 10))
            done
          }

          apt_get_with_retry() {
            local context="$1"
            shift
            local attempt=1
            local max_attempts=6

            while true; do
              wait_for_apt "${context}"
              if DEBIAN_FRONTEND=noninteractive run_with_timeout 10m \
                apt-get -o DPkg::Lock::Timeout=300 "$@"; then
                return 0
              fi

              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "apt-get ${context} failed after ${max_attempts} attempts." >&2
                return 1
              fi

              echo "apt-get ${context} failed; retrying after lock/backoff (${attempt}/${max_attempts})..."
              sleep 10
              attempt=$((attempt + 1))
            done
          }

          install_tailscale() {
            install -d -m 0755 /usr/share/keyrings
            curl --connect-timeout 10 --max-time 60 -fsSL \
              https://pkgs.tailscale.com/stable/ubuntu/jammy.noarmor.gpg \
              -o /usr/share/keyrings/tailscale-archive-keyring.gpg
            chmod 0644 /usr/share/keyrings/tailscale-archive-keyring.gpg
            curl --connect-timeout 10 --max-time 60 -fsSL \
              https://pkgs.tailscale.com/stable/ubuntu/jammy.tailscale-keyring.list \
              -o /etc/apt/sources.list.d/tailscale.list
            chmod 0644 /etc/apt/sources.list.d/tailscale.list
            apt_get_with_retry "update package indexes" update
            apt_get_with_retry "install Tailscale" install -y tailscale
          }

          if ! command -v tailscale >/dev/null 2>&1; then
            install_tailscale
          fi

          run_with_timeout 1m systemctl enable --now tailscaled
          install -m 600 -o root -g root /tmp/poma-tailscale-authkey /run/poma-tailscale-authkey
          auth_key="$(cat /run/poma-tailscale-authkey)"
          run_with_timeout 2m tailscale up --auth-key="${auth_key}" --hostname="${TAILSCALE_HOSTNAME}" --accept-dns=false
          run_with_timeout 30s tailscale status
          SCRIPT

          run_with_timeout 5m gcloud compute ssh "${instance_name}" "${ssh_common[@]}" --command \
            'timeout --kill-after=30s 300s bash -c '\''until [ -f /var/lib/cloud/instance/boot-finished ]; do sleep 5; done'\'''
          run_with_timeout 2m gcloud compute scp "${auth_key_file}" "${instance_name}:/tmp/poma-tailscale-authkey" "${ssh_common[@]}"
          run_with_timeout 2m gcloud compute scp "${remote_script}" "${instance_name}:/tmp/poma-configure-tailscale.sh" "${ssh_common[@]}"
          run_with_timeout 8m gcloud compute ssh "${instance_name}" "${ssh_common[@]}" --command \
            "sudo env TAILSCALE_HOSTNAME='${tailscale_hostname}' bash /tmp/poma-configure-tailscale.sh"

      - name: Package application
        if: ${{ inputs.terraform_action == 'apply' && inputs.deploy_app }}
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='.env' \
            --exclude='.env.deploy' \
            --exclude='reports' \
            --exclude='state' \
            --exclude='logs' \
            -czf /tmp/poma.tar.gz .

      - name: Upload and install on VM
        if: ${{ inputs.terraform_action == 'apply' && inputs.deploy_app }}
        run: |
          set -euo pipefail

          instance_name="$(terraform -chdir=infra/gcp-free-tier output -raw instance_name)"
          zone="$(terraform -chdir=infra/gcp-free-tier output -raw zone)"
          ssh_common=(--zone "${zone}" --tunnel-through-iap --ssh-key-expire-after=15m --quiet)

          gcloud compute ssh "${instance_name}" "${ssh_common[@]}" --command \
            'while [ ! -f /var/lib/cloud/instance/boot-finished ]; do sleep 5; done'

          gcloud compute scp /tmp/poma.tar.gz "${instance_name}:/tmp/poma.tar.gz" "${ssh_common[@]}"
          gcloud compute scp .env.deploy "${instance_name}:/tmp/poma.env" "${ssh_common[@]}"

          gcloud compute ssh "${instance_name}" "${ssh_common[@]}" --command '
            set -euo pipefail
            sudo mkdir -p /opt/poma
            sudo tar -xzf /tmp/poma.tar.gz -C /opt/poma
            sudo mv /tmp/poma.env /opt/poma/.env
            sudo chmod 600 /opt/poma/.env
            sudo chown -R poma:poma /opt/poma
            cd /opt/poma
            sudo python3 ops/scripts/install_ibc_config_helper.py
            sudo sh ops/scripts/ensure_ibgateway_service.sh
            sudo -u poma env RUN_DEPLOY_SMOKE=${{ inputs.deploy_smoke }} bash ops/scripts/deploy.sh
            sudo -u poma crontab ops/cron/poma.cron
          '

      - name: Notify Telegram (deployment result)
        if: ${{ always() }}
        uses: ./.github/actions/telegram-notify
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: >-
            POMA[${{ inputs.deploy_environment }}] deploy ${{ job.status }} —
            terraform=${{ inputs.terraform_action }}, app=${{ inputs.deploy_app }},
            mode=${{ inputs.trading_mode }}, provider=${{ inputs.data_provider }}
            (${{ github.sha }})
