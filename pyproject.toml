[build-system]
requires = ["setuptools>=70", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "poma"
version = "0.1.0"
description = "Nasdaq-100 rebalancer scaffold."
requires-python = ">=3.11"
dependencies = ["pandas>=2.2.2", "pydantic>=2.8.2", "pydantic-settings>=2.4.0", "requests>=2.32.3", "rich>=13.7.1", "typer>=0.12.3"]

[project.optional-dependencies]
dev = ["mypy>=1.10.0", "pytest>=8.2.2", "pytest-cov>=5.0.0", "ruff>=0.5.5"]

[project.scripts]
poma = "poma.cli:app"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
packages = ["poma"]

[tool.pytest.ini_options]
testpaths = ["tests"]
